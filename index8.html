<!DOCTYPE html>
<html lang="ru">

  <style>

    #scanZone.active::before { color:#FFC107; content:'Сканирование...'; }

class ImgProc {
  static toGray(imageData){
    const {data,width,height}=imageData;
    const gray=new Uint8ClampedArray(width*height);
    for(let i=0,p=0;i<data.length;i+=4,p++){
      gray[p]=(0.299*data[i]+0.587*data[i+1]+0.114*data[i+2])|0;
    }
    return {gray,width,height};
  }

  static stdDev(gray){
    const n=gray.length; let sum=0, sum2=0;
    for(let i=0;i<n;i++){ const v=gray[i]; sum+=v; sum2+=v*v; }
    const mean=sum/n;
    const varr=Math.max(1e-9,(sum2/n)-mean*mean);
    return Math.sqrt(varr);
  }

  static blur3x3(gray,w,h){ /* оставлен как был */ 
    const out=new Uint8ClampedArray(gray.length);
    const idx=(x,y)=>y*w+x;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      let sum=0,c=0;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
        const yy=y+dy, xx=x+dx;
        if(yy>=0&&yy<h&&xx>=0&&xx<w){ sum+=gray[idx(xx,yy)]; c++; }

      out[idx(x,y)]=(sum/c)|0;

  }

  static ncc01(a,aStats,b,bStats){ /* как было */ }

  // === НОВОЕ: поиск приблизительных углов карты ===
  static detectCardCorners(gray, w, h) {
    const thr = 210; // светлые области карты
    const points = { tl: null, tr: null, bl: null, br: null };

    // TL
    for (let y = 0; y < h*0.45 && !points.tl; y++)
      for (let x = 0; x < w*0.45; x++)
        if (gray[y*w + x] > thr) { points.tl = {x, y}; break; }

    // TR
    for (let y = 0; y < h*0.45 && !points.tr; y++)
      for (let x = w-1; x > w*0.55; x--)
        if (gray[y*w + x] > thr) { points.tr = {x, y}; break; }

    // BL
    for (let y = h-1; y > h*0.55 && !points.bl; y--)
      for (let x = 0; x < w*0.45; x++)
        if (gray[y*w + x] > thr) { points.bl = {x, y}; break; }

    // BR
    for (let y = h-1; y > h*0.55 && !points.br; y--)
      for (let x = w-1; x > w*0.55; x--)
        if (gray[y*w + x] > thr) { points.br = {x, y}; break; }

    if (!points.tl || !points.tr || !points.bl || !points.br) return null;
    return points;
  }

  // === НОВОЕ: упрощённая коррекция (пока affine-like через drawImage с padding) ===
  static correctPerspective(imageData, corners) {
    if (!corners) return imageData;

    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = imageData.width;
    srcCanvas.height = imageData.height;
    srcCanvas.getContext('2d').putImageData(imageData, 0, 0);

    const dstCanvas = document.createElement('canvas');
    dstCanvas.width = CONFIG.norm.width * 1.15 | 0;
    dstCanvas.height = CONFIG.norm.height * 1.15 | 0;
    const ctx = dstCanvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, dstCanvas.width, dstCanvas.height);

    // Простая растяжка (можно улучшить позже)
    ctx.drawImage(srcCanvas, 0, 0, dstCanvas.width, dstCanvas.height);

    return ctx.getImageData(0, 0, dstCanvas.width, dstCanvas.height);
  }

  // === НОВОЕ: подсчёт пипов в центре ===
  static countPips(normData, suitColor) {
    const {gray, width: w, height: h} = ImgProc.toGray(normData);
    const cx = w >> 1, cy = h >> 1;
    const win = 88;
    let darkCount = 0;

    for (let y = Math.max(0, cy - win); y < Math.min(h, cy + win); y += 5) {
      for (let x = Math.max(0, cx - win); x < Math.min(w, cx + win); x += 5) {
        if (gray[y * w + x] < 170) darkCount++;
      }
    }
    const estimated = Math.round(darkCount / 18); // грубая калибровка под 7-10
    return Math.max(0, Math.min(12, estimated));
  }

/* ===== TemplateLoader ===== */
class TemplateLoader {
  static async loadImage(url){ /* как было */ }

  static drawToNormCanvas(img){ /* как было */ }

  static preprocessTemplate(normData, suit) {
    const fullSmall = ImgProc.downsampleToGray(normData, CONFIG.small.width, CONFIG.small.height);
    const fullStats = ImgProc.arrayStats(fullSmall);

    const tl = ImgProc.extractCorner(normData,'tl');
    const br = ImgProc.extractCorner(normData,'br');

    const normalizeCornerIf = (corner) => SETTINGS.cornerNormalize ? ImgProc.normalizeCorner(corner).imageData : corner;
    const tlN = normalizeCornerIf(tl);
    const brN = normalizeCornerIf(br);

    const buildMask = (cornerImageData, angleDeg) => {
      const imgRot = ImgProc.rotateImageData(cornerImageData, angleDeg);
      let {gray,width:w,height:h} = ImgProc.toGray(imgRot);
      if (SETTINGS.blur3x3) gray = ImgProc.blur3x3(gray,w,h);
      const mask = ImgProc.adaptiveThreshold(gray,w,h,SETTINGS.adaptiveWindow,SETTINGS.adaptiveC);
      return {mask,w,h};
    };

    const tlMasks = {}, brMasks = {};
    let cw=0, ch=0;
    for (const a of SETTINGS.cornerAngles) {
      const m1 = buildMask(tlN, a);
      const m2 = buildMask(brN, a);
      tlMasks[a] = m1.mask; brMasks[a] = m2.mask;
      cw = m1.w; ch = m1.h;
    }

    const pipCount = ImgProc.countPips(normData, CARDS[suit]?.color || 'black');

    return {
      fullSmall, fullStats,
      cornerW: cw, cornerH: ch,
      tlMasks, brMasks,
      pipCount,
      suitColor: CARDS[suit]?.color || 'black'
    };
  }

      cw = m1.w; ch = m1.h;
    }

    const redRatio = ImgProc.redRatio(normData);
    const suitHint = (redRatio > 0.08) ? 'red' : 'black';
    const pipCount = ImgProc.countPips(normData, suitHint === 'red' ? 'red' : 'black');

    return { std, fullSmall, fullStats, cornerW:cw, cornerH:ch, tlMasks, brMasks, redRatio, suitHint, pipCount };
  }

  scoreCornerDual(prep, tmpl){ /* как было */ }

  async recognize(normData){
    if (!this.ready) return { error:'Шаблоны не готовы', candidates:[] };

    let prep = this.preprocessInput(normData);
    const corners = ImgProc.detectCardCorners(ImgProc.toGray(normData).gray, normData.width, normData.height);
    let corrected = normData;
    if (corners) corrected = ImgProc.correctPerspective(normData, corners);

    // перезапускаем preprocess на corrected (если удалось)
    if (corners) prep = this.preprocessInput(corrected);

    const candidates = [];
    for (const [id, t] of Object.entries(this.templates)) {
      const cornerRes = this.scoreCornerDual(prep, t);
      const full = ImgProc.ncc01(prep.fullSmall, prep.fullStats, t.fullSmall, t.fullStats);
      const suit = (t.suitColor === prep.suitHint) ? 1.0 : 0.6;

      const pipScore = t.pipCount ? Math.max(0, 1 - Math.abs(t.pipCount - prep.pipCount) / 8) : 0.5;

      const total = (
        SETTINGS.wCorner * cornerRes.score +
        SETTINGS.wFull * full +
        SETTINGS.wSuit * suit +
        SETTINGS.wPips * pipScore
      ) / (SETTINGS.wCorner + SETTINGS.wFull + SETTINGS.wSuit + SETTINGS.wPips);

      candidates.push({
        id, name:t.name, rank:t.rank, suit:t.suit,
        total, corner: cornerRes.score, full, suitPrior: suit, pipScore, pipCount: prep.pipCount
      });
    }

    candidates.sort((a,b)=>b.total - a.total);
    const best = candidates[0];
    const second = candidates[1];

    if (!best || best.total < SETTINGS.minScore) 
      return { error: `Слабое совпадение (${(best?.total*100||0).toFixed(1)}%)`, candidates, prep };

    const margin = best.total - (second?.total || 0);
    if (margin < SETTINGS.minMargin) 
      return { error: `Неуверенно (разрыв ${(margin*100).toFixed(1)}%)`, candidates, prep };

    return {
      rank: best.rank,
      suit: best.suit,
      name: best.name,
      confidence: Math.round(best.total*100),
      debug: { best: best.name, bestScore: (best.total*100).toFixed(1)+'%', pipCount: best.pipCount },
      candidates, prep
    };
  }
}
