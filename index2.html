<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Распознавание карт v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-size: 14px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #canvas {
            display: none;
        }
        /* ========== ВЕРХ: Зона сканирования ========== */
        #topArea {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 10px;
            z-index: 10;
        }
        #scanZone {
            width: 200px;
            height: 280px;
            border: 3px solid #4CAF50;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
            flex-shrink: 0;
            position: relative;
        }
        #scanZone::before {
            content: '📍 Наведите карту сюда';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #4CAF50;
            font-size: 11px;
            white-space: nowrap;
        }
        #scanZone.active {
            border-color: #FFC107;
            animation: glow 0.6s infinite;
        }
        #scanZone.active::before {
            color: #FFC107;
            content: '🔍 Сканирование...';
        }
        #scanZone.error {
            border-color: #f44336;
            animation: shake 0.4s;
        }
        #scanZone.error::before {
            color: #f44336;
            content: '❌ Не распознано';
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7), 0 0 16px #FFC107; }
            50% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7), 0 0 28px #FFC107; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        #ctrlButtons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ctrl-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .ctrl-btn:active {
            transform: scale(0.9);
        }
        .ctrl-btn.on {
            background: rgba(76, 175, 80, 0.85);
            border-color: #4CAF50;
        }
        /* ========== ЦЕНТР: Результат ========== */
        #resultCard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 20px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            opacity: 0;
            transition: 0.3s;
            z-index: 100;
        }
        #resultCard.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #cardSymbol {
            font-size: 72px;
            font-weight: bold;
            line-height: 1;
        }
        #cardTitle {
            font-size: 16px;
            color: #555;
            margin-top: 8px;
            font-weight: 500;
        }
        #cardConfidence {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .red { color: #e53935; }
        .black { color: #212121; }
        /* Статус */
        #statusBar {
            position: absolute;
            top: 320px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 11px;
            max-width: 90%;
            text-align: center;
            z-index: 10;
        }
        #statusBar.error { background: rgba(244, 67, 54, 0.95); }
        #statusBar.ok { background: rgba(76, 175, 80, 0.95); }
        /* ========== НИЗ: История + Кнопки ========== */
        #bottomArea {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            z-index: 10;
        }
        #historyLog {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            padding: 6px 10px;
            width: 100%;
            max-width: 320px;
            max-height: 50px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 9px;
            color: #0f0;
        }
        .log-line {
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .log-err { color: #f44336; }
        .log-ok { color: #4CAF50; }
        #actionButtons {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 320px;
        }
        .action-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 0;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:active {
            transform: scale(0.96);
        }
        .action-btn.auto {
            background: linear-gradient(135deg, #FFC107 0%, #FF9800 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.5);
        }
        .action-btn.auto.on {
            background: linear-gradient(135deg, #4CAF50 0%, #43A047 100%);
        }
        /* ========== Настройки ========== */
        #settingsPanel {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            padding: 10px;
            z-index: 10;
            display: none;
        }
        #settingsPanel.show {
            display: block;
        }
        .settings-title {
            color: #FFC107;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: center;
        }
        .settings-item {
            margin: 4px 0;
        }
        .settings-label {
            color: #aaa;
            font-size: 8px;
            display: block;
            margin-bottom: 2px;
        }
        .settings-value {
            color: #0f0;
            font-size: 9px;
            font-family: monospace;
        }
        /* Debug */
        #debugPanel {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            padding: 10px;
            font-family: monospace;
            font-size: 8px;
            color: #0f0;
            max-width: 160px;
            display: none;
            z-index: 10;
        }
        #debugPanel.show {
            display: block;
        }
        .dbg-line {
            margin: 2px 0;
            padding-bottom: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Загрузка */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 16px;
            z-index: 999;
            min-width: 200px;
        }
        .spin {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: rotate 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes rotate {
            to { transform: rotate(360deg); }
        }
        #loaderText {
            font-size: 13px;
            margin-bottom: 8px;
        }
        #loaderSubtext {
            font-size: 10px;
            color: #888;
        }
        /* Скроллбар */
        #historyLog::-webkit-scrollbar {
            width: 3px;
        }
        #historyLog::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 2px;
        }
        /* Подсказка */
        #hint {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 5;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <!-- Верх: Зона сканирования -->
        <div id="topArea">
            <div id="scanZone"></div>
            <div id="ctrlButtons">
                <div class="ctrl-btn" id="debugBtn" title="Отладка">🐛</div>
                <div class="ctrl-btn" id="settingsBtn" title="Настройки">⚙️</div>
                <div class="ctrl-btn" id="switchBtn" title="Камера">📷</div>
            </div>
        </div>
        
        <!-- Центр: Результат -->
        <div id="resultCard">
            <div id="cardSymbol">?</div>
            <div id="cardTitle">Ожидание...</div>
            <div id="cardConfidence"></div>
        </div>
        
        <!-- Статус -->
        <div id="statusBar">Наведите камеру на карту</div>
        
        <!-- Подсказка -->
        <div id="hint">💡 Держите карту в рамке при хорошем освещении</div>
        
        <!-- Низ: История + Кнопки -->
        <div id="bottomArea">
            <div id="historyLog"></div>
            <div id="actionButtons">
                <button class="action-btn" id="recognizeBtn">🎯 Распознать</button>
                <button class="action-btn auto" id="autoBtn">🔄 Авто</button>
            </div>
        </div>
        
        <!-- Настройки -->
        <div id="settingsPanel">
            <div class="settings-title">⚙️ НАСТРОЙКИ</div>
            <div class="settings-item">
                <span class="settings-label">Зона сканирования:</span>
                <span class="settings-value" id="scanSizeValue">200×280</span>
            </div>
            <div class="settings-item">
                <span class="settings-label">Порог совпадения:</span>
                <span class="settings-value" id="thresholdValue">55%</span>
            </div>
            <div class="settings-item">
                <span class="settings-label">Шаблонов:</span>
                <span class="settings-value" id="templatesValue">0/8</span>
            </div>
        </div>
        
        <!-- Debug -->
        <div id="debugPanel">
            <div style="font-weight: bold; color: #FFC107; margin-bottom: 4px;">🔬 DEBUG</div>
            <div id="debugInfo"></div>
        </div>
        
        <!-- Загрузка -->
        <div id="loader">
            <div class="spin"></div>
            <div id="loaderText">Инициализация...</div>
            <div id="loaderSubtext">Загрузка системы распознавания</div>
        </div>
    </div>
    <script>
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        const CONFIG = {
            video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'environment' },
            canvas: { width: 640, height: 480 },
            
            // Увеличенная зона сканирования
            scanZone: {
                width: 200,
                height: 280,
                cornerWidth: 0.35,  // 35% от ширины зоны
                cornerHeight: 0.35  // 35% от высоты зоны
            },
            
            // Шаблоны карт
            templates: [
                { id: '7h', rank: '7', suit: '♥', name: '7 Червей' },
                { id: '8p', rank: '8', suit: '♠', name: '8 Пик' },
                { id: '9tr', rank: '9', suit: '♣', name: '9 Треф' },
                { id: '10b', rank: '10', suit: '♦', name: '10 Бубен' },
                { id: 'dh', rank: 'Q', suit: '♥', name: 'Дама Червей' },
                { id: 'kp', rank: 'K', suit: '♠', name: 'Король Пик' },
                { id: 'tb', rank: 'A', suit: '♦', name: 'Туз Бубен' },
                { id: 'vtr', rank: 'J', suit: '♣', name: 'Валет Треф' }
            ],
            
            thresholds: {
                minScore: 0.50,
                minMargin: 0.08,
                whiteMin: 0.10,
                whiteMax: 0.90
            }
        };
        const CARDS = {
            '♥': { name: 'Червы', class: 'red' },
            '♦': { name: 'Бубны', class: 'red' },
            '♠': { name: 'Пики', class: 'black' },
            '♣': { name: 'Трефы', class: 'black' }
        };
        // ============================================
        // ГЕНЕРАТОР ШАБЛОНОВ (создаёт реалистичные изображения)
        // ============================================
        class TemplateGenerator {
            static generateCard(rank, suit, suitClass) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const width = 200;
                const height = 280;
                
                canvas.width = width;
                canvas.height = height;
                
                // Белый фон карты
                ctx.fillStyle = '#fafafa';
                ctx.fillRect(0, 0, width, height);
                
                // Скруглённые углы (имитация карты)
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(5, 5, width - 10, height - 10, 10);
                ctx.stroke();
                
                const color = suitClass === 'red' ? '#d32f2f' : '#212121';
                
                // Верхний левый угол - ранг
                ctx.fillStyle = color;
                ctx.font = 'bold 36px Arial, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(rank, 12, 8);
                
                // Масть под рангом
                ctx.font = '28px Arial, sans-serif';
                ctx.fillText(suit, 15, 45);
                
                // Маленькие индексы
                ctx.font = '14px Arial, sans-serif';
                ctx.fillText(rank, 10, 80);
                ctx.fillText(suit, 12, 95);
                
                // Большая масть в центре (для наглядности)
                ctx.font = '80px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(suit, width / 2, height / 2 + 30);
                
                return canvas;
            }
            
            static async generateAllTemplates() {
                const templates = {};
                
                for (const card of CONFIG.templates) {
                    const suitInfo = CARDS[card.suit];
                    const cardCanvas = this.generateCard(card.rank, card.suit, suitInfo.class);
                    
                    // Добавляем вариации освещения
                    const variedCanvas = this.addLightingVariation(cardCanvas, card.id);
                    
                    templates[card.id] = {
                        ...card,
                        canvas: variedCanvas,
                        imageData: this.extractImageData(variedCanvas)
                    };
                }
                
                return templates;
            }
            
            static addLightingVariation(canvas, seed) {
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // Разная яркость для разных карт
                const brightnessOffset = (seed.charCodeAt(0) % 15);
                
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, Math.max(0, data[i] + brightnessOffset));
                    data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + brightnessOffset));
                    data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + brightnessOffset));
                }
                
                ctx.putImageData(imageData, 0, 0);
                return canvas;
            }
            
            static extractImageData(canvas) {
                const ctx = canvas.getContext('2d');
                return ctx.getImageData(0, 0, canvas.width, canvas.height);
            }
        }
        // ============================================
        // РАСПОЗНАВАТЕЛЬ
        // ============================================
        class CardRecognizer {
            constructor() {
                this.templates = {};
                this.ready = false;
            }
            async loadTemplates() {
                try {
                    this.templates = await TemplateGenerator.generateAllTemplates();
                    this.ready = Object.keys(this.templates).length > 0;
                    return { 
                        success: this.ready, 
                        loaded: Object.keys(this.templates).length,
                        total: CONFIG.templates.length 
                    };
                } catch (error) {
                    console.error('Template generation error:', error);
                    return { success: false, loaded: 0, total: CONFIG.templates.length };
                }
            }
            async recognizeCard(imageData) {
                const debug = {};
                
                if (!this.ready) {
                    return { error: 'Шаблоны не готовы', debug };
                }
                try {
                    // 1. Анализ фона
                    const bgAnalysis = this.analyzeBackground(imageData);
                    debug.whiteBg = (bgAnalysis.ratio * 100).toFixed(0) + '%';
                    debug.brightness = bgAnalysis.avgBrightness.toFixed(0);
                    
                    if (!bgAnalysis.hasCard) {
                        return { error: 'Нет карты в зоне', debug };
                    }
                    // 2. Нормализация
                    const normalizedInput = this.normalizeBrightness(imageData, 220);
                    
                    // 3. Извлечение угла
                    const corner = this.extractCorner(normalizedInput);
                    
                    // 4. Сравнение с шаблонами
                    const scores = [];
                    
                    for (const [id, template] of Object.entries(this.templates)) {
                        const score = this.compareImages(corner, template.imageData);
                        scores.push({ id, score, ...template });
                    }
                    
                    scores.sort((a, b) => b.score - a.score);
                    
                    const bestMatch = scores[0];
                    const secondMatch = scores[1];
                    
                    debug.bestScore = (bestMatch.score * 100).toFixed(1) + '%';
                    debug.bestCard = bestMatch.name;
                    
                    if (secondMatch) {
                        debug.secondScore = (secondMatch.score * 100).toFixed(1) + '%';
                        debug.secondCard = secondMatch.name;
                        debug.margin = ((bestMatch.score - secondMatch.score) * 100).toFixed(1) + '%';
                    }
                    
                    // 5. Проверка порогов
                    if (bestMatch.score < CONFIG.thresholds.minScore) {
                        return { 
                            error: `Слабое совпадение (${debug.bestScore})`, 
                            debug 
                        };
                    }
                    
                    const margin = bestMatch.score - (secondMatch?.score || 0);
                    if (margin < CONFIG.thresholds.minMargin) {
                        return { 
                            error: `Неуверенно (разрыв ${debug.margin || 'N/A'})`, 
                            debug 
                        };
                    }
                    
                    return {
                        rank: bestMatch.rank,
                        suit: bestMatch.suit,
                        name: bestMatch.name,
                        confidence: Math.round(bestMatch.score * 100),
                        debug: debug
                    };
                    
                } catch (error) {
                    console.error('Recognition error:', error);
                    return { error: error.message, debug };
                }
            }
            analyzeBackground(imageData) {
                const { data, width, height } = imageData;
                let whitePixels = 0;
                let totalBrightness = 0;
                const total = width * height;
                const step = 4;
                
                for (let i = 0; i < data.length; i += 4 * step) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    const brightness = (r + g + b) / 3;
                    const variance = Math.abs(r - g) + Math.abs(g - b) + Math.abs(b - r);
                    
                    totalBrightness += brightness;
                    
                    if (brightness > 180 && variance < 50) {
                        whitePixels++;
                    }
                }
                
                const ratio = (whitePixels * step) / total;
                const avgBrightness = totalBrightness / (total / step);
                
                return {
                    hasCard: ratio > CONFIG.thresholds.whiteMin && ratio < CONFIG.thresholds.whiteMax,
                    ratio: ratio,
                    avgBrightness: avgBrightness
                };
            }
            normalizeBrightness(imageData, targetBrightness) {
                const { data, width, height } = imageData;
                const newImageData = new ImageData(width, height);
                const newData = newImageData.data;
                
                let totalBrightness = 0;
                for (let i = 0; i < data.length; i += 4) {
                    totalBrightness += (data[i] + data[i + 1] + data[i + 2]) / 3;
                }
                const avgBrightness = totalBrightness / (data.length / 4);
                
                const scale = targetBrightness / (avgBrightness || 1);
                
                for (let i = 0; i < data.length; i += 4) {
                    newData[i] = Math.min(255, Math.max(0, data[i] * scale));
                    newData[i + 1] = Math.min(255, Math.max(0, data[i + 1] * scale));
                    newData[i + 2] = Math.min(255, Math.max(0, data[i + 2] * scale));
                    newData[i + 3] = data[i + 3];
                }
                
                return newImageData;
            }
            extractCorner(imageData) {
                const { width, height } = imageData;
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const cornerW = Math.floor(width * CONFIG.scanZone.cornerWidth);
                const cornerH = Math.floor(height * CONFIG.scanZone.cornerHeight);
                
                canvas.width = cornerW;
                canvas.height = cornerH;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(imageData, 0, 0);
                
                ctx.drawImage(tempCanvas, 0, 0, cornerW, cornerH);
                
                return ctx.getImageData(0, 0, cornerW, cornerH);
            }
            compareImages(img1, img2) {
                if (img1.width !== img2.width || img1.height !== img2.height) {
                    img1 = this.resizeImageData(img1, img2.width, img2.height);
                }
                
                const data1 = img1.data;
                const data2 = img2.data;
                
                let totalDiff = 0;
                const pixels = data1.length / 4;
                let matchCount = 0;
                
                for (let i = 0; i < data1.length; i += 4) {
                    const r1 = data1[i], g1 = data1[i + 1], b1 = data1[i + 2];
                    const r2 = data2[i], g2 = data2[i + 1], b2 = data2[i + 2];
                    
                    const diff = Math.sqrt(
                        Math.pow(r1 - r2, 2) +
                        Math.pow(g1 - g2, 2) +
                        Math.pow(b1 - b2, 2)
                    );
                    
                    totalDiff += diff;
                    if (diff < 35) matchCount++;
                }
                
                const avgDiff = totalDiff / pixels;
                const maxDiff = 441;
                
                const diffScore = 1 - (avgDiff / maxDiff);
                const matchScore = matchCount / pixels;
                
                return Math.max(0, Math.min(1, (diffScore * 0.4) + (matchScore * 0.6)));
            }
            resizeImageData(imageData, newWidth, newHeight) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = newWidth;
                canvas.height = newHeight;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = imageData.width;
                tempCanvas.height = imageData.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(imageData, 0, 0);
                
                ctx.drawImage(tempCanvas, 0, 0, newWidth, newHeight);
                
                return ctx.getImageData(0, 0, newWidth, newHeight);
            }
        }
        // ============================================
        // ПРИЛОЖЕНИЕ
        // ============================================
        class App {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.loader = document.getElementById('loader');
                
                this.recognizer = new CardRecognizer();
                this.stream = null;
                this.facingMode = 'environment';
                this.debugMode = false;
                this.autoMode = false;
                this.autoInterval = null;
                this.settingsOpen = false;
                
                this.init();
            }
            async init() {
                try {
                    this.setStatus('Загрузка шаблонов...');
                    const loadResult = await this.recognizer.loadTemplates();
                    
                    if (!loadResult.success) {
                        throw new Error('Не удалось создать шаблоны');
                    }
                    
                    this.log(`✓ Шаблонов: ${loadResult.loaded}`, 'ok');
                    document.getElementById('templatesValue').textContent = `${loadResult.loaded}/${loadResult.total}`;
                    
                    this.setStatus('Запуск камеры...');
                    await this.startCamera();
                    this.setupCanvas();
                    this.setupControls();
                    
                    this.loader.style.display = 'none';
                    this.setStatus('Наведите камеру на карту');
                    
                } catch (err) {
                    this.loader.innerHTML = `
                        <div style="color: #f44336; font-size: 16px; font-weight: bold;">Ошибка!</div>
                        <div style="font-size: 12px; margin-top: 10px;">${err.message}</div>
                        <div style="font-size: 10px; margin-top: 10px; color: #888;">Проверьте доступ к камере</div>
                    `;
                    console.error('Init error:', err);
                }
            }
            async startCamera() {
                const constraints = {
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: this.facingMode
                    }
                };
                
                this.stream = await navigator.mediaDevices.getUserMedia(constraints);
                this.video.srcObject = this.stream;
                
                return new Promise((resolve) => {
                    this.video.onloadedmetadata = () => {
                        this.video.play();
                        resolve();
                    };
                });
            }
            setupCanvas() {
                this.canvas.width = CONFIG.canvas.width;
                this.canvas.height = CONFIG.canvas.height;
            }
            setupControls() {
                document.getElementById('recognizeBtn').onclick = () => this.recognize();
                
                document.getElementById('autoBtn').onclick = () => {
                    this.autoMode = !this.autoMode;
                    const btn = document.getElementById('autoBtn');
                    btn.classList.toggle('on', this.autoMode);
                    btn.textContent = this.autoMode ? '⏸ Стоп' : '🔄 Авто';
                    
                    if (this.autoMode) {
                        this.log('Авто режим ВКЛ', 'ok');
                        this.autoInterval = setInterval(() => this.recognize(), 2500);
                    } else {
                        this.log('Авто режим ВЫКЛ');
                        clearInterval(this.autoInterval);
                    }
                };
                
                document.getElementById('debugBtn').onclick = () => {
                    this.debugMode = !this.debugMode;
                    document.getElementById('debugPanel').classList.toggle('show', this.debugMode);
                    document.getElementById('debugBtn').classList.toggle('on', this.debugMode);
                };
                
                document.getElementById('settingsBtn').onclick = () => {
                    this.settingsOpen = !this.settingsOpen;
                    document.getElementById('settingsPanel').classList.toggle('show', this.settingsOpen);
                    document.getElementById('settingsBtn').classList.toggle('on', this.settingsOpen);
                };
                
                document.getElementById('switchBtn').onclick = async () => {
                    this.facingMode = this.facingMode === 'environment' ? 'user' : 'environment';
                    if (this.stream) {
                        this.stream.getTracks().forEach(t => t.stop());
                    }
                    await this.startCamera();
                    this.log('Камера переключена', 'ok');
                };
            }
            async recognize() {
                const btn = document.getElementById('recognizeBtn');
                const zone = document.getElementById('scanZone');
                
                btn.textContent = '⏳';
                zone.classList.add('active');
                this.setStatus('Анализ...');
                
                await new Promise(r => setTimeout(r, 50));
                
                this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                const scanData = this.getScanData();
                
                const result = await this.recognizer.recognizeCard(scanData);
                
                if (this.debugMode && result.debug) {
                    let html = '';
                    for (const [key, value] of Object.entries(result.debug)) {
                        const label = {
                            whiteBg: '📊 Белый:',
                            brightness: '💡 Яркость:',
                            bestScore: '⭐ Лучший:',
                            bestCard: '🃏 Карта:',
                            secondScore: '2️⃣ Второй:',
                            secondCard: '2️⃣ Карта:',
                            margin: '📏 Разрыв:'
                        }[key] || key;
                        html += `<div class="dbg-line">${label} ${value}</div>`;
                    }
                    document.getElementById('debugInfo').innerHTML = html;
                }
                
                btn.textContent = '🎯 Распознать';
                zone.classList.remove('active');
                
                if (result.error) {
                    zone.classList.add('error');
                    setTimeout(() => zone.classList.remove('error'), 800);
                    this.setStatus(result.error, 'error');
                    this.log('✗ ' + result.error, 'err');
                } else {
                    this.showResult(result);
                    this.setStatus('✅ ' + result.name, 'ok');
                    this.log(`✓ ${result.name} (${result.confidence}%)`, 'ok');
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                }
            }
            getScanData() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                // Вычисляем размеры зоны сканирования пропорционально canvas
                const zoneW = CONFIG.scanZone.width;
                const zoneH = CONFIG.scanZone.height;
                
                // Центрируем зону
                const sx = Math.floor((w - zoneW) / 2);
                const sy = Math.floor((h - zoneH) / 2);
                
                return this.ctx.getImageData(sx, sy, zoneW, zoneH);
            }
            showResult(card) {
                const suitInfo = CARDS[card.suit] || { name: '?', class: '' };
                
                document.getElementById('cardSymbol').textContent = `${card.rank}${card.suit}`;
                document.getElementById('cardSymbol').className = suitInfo.class;
                document.getElementById('cardTitle').textContent = card.name;
                document.getElementById('cardConfidence').textContent = `Уверенность: ${card.confidence}%`;
                
                const box = document.getElementById('resultCard');
                box.classList.add('show');
                setTimeout(() => box.classList.remove('show'), 3500);
            }
            setStatus(text, type = '') {
                const el = document.getElementById('statusBar');
                el.textContent = text;
                el.className = type;
            }
            log(text, type = '') {
                const box = document.getElementById('historyLog');
                const line = document.createElement('div');
                line.className = 'log-line' + (type ? ' log-' + type : '');
                line.textContent = new Date().toLocaleTimeString().slice(-8) + ' ' + text;
                box.insertBefore(line, box.firstChild);
                while (box.children.length > 10) box.removeChild(box.lastChild);
            }
        }
        // Запуск
        window.addEventListener('load', () => new App());
    </script>
</body>
</html>
