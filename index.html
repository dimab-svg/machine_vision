<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Распознавание карт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        #topSection {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 10px;
            padding: 0 15px;
        }

        #scanArea {
            width: 160px;
            height: 220px;
            border: 3px solid #4CAF50;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        #scanArea.processing {
            border-color: #FFC107;
            animation: pulse 1s infinite;
        }

        #scanArea.error {
            border-color: #f44336;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5), 0 0 15px #FFC107; }
            50% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5), 0 0 25px #FFC107; }
        }

        #controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.9);
        }

        .ctrl-btn.active {
            background: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        #resultBox {
            position: absolute;
            top: 270px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #resultBox.show {
            opacity: 1;
        }

        #cardDisplay {
            font-size: 48px;
            font-weight: bold;
            line-height: 1;
        }

        #cardName {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .suit-hearts, .suit-diamonds { color: #e53935; }
        .suit-spades, .suit-clubs { color: #212121; }

        #statusMsg {
            position: absolute;
            top: 360px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            white-space: nowrap;
            max-width: 80%;
            text-align: center;
        }

        #statusMsg.error { background: rgba(244, 67, 54, 0.9); }
        #statusMsg.success { background: rgba(76, 175, 80, 0.9); }

        #bottomSection {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        #historyBox {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 6px 10px;
            width: 100%;
            max-width: 320px;
            max-height: 70px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 10px;
            color: #0f0;
        }

        .history-item {
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-error { color: #f44336; }
        .history-success { color: #4CAF50; }

        #recognizeBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 320px;
        }

        #recognizeBtn:active {
            transform: scale(0.97);
        }

        #recognizeBtn.processing {
            background: linear-gradient(135deg, #FFC107 0%, #FF9800 100%);
        }

        #debugBox {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 9px;
            color: #0f0;
            max-width: 150px;
            display: none;
        }

        #debugBox.show {
            display: block;
        }

        .debug-line {
            margin: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-radius: 15px;
            z-index: 100;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loadingText {
            font-size: 13px;
        }

        #historyBox::-webkit-scrollbar {
            width: 3px;
        }

        #historyBox::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        #historyBox::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div id="topSection">
            <div id="scanArea"></div>
            <div id="controls">
                <div class="ctrl-btn" id="autoBtn" title="Авто">🔄</div>
                <div class="ctrl-btn" id="debugBtn" title="Debug">🐛</div>
                <div class="ctrl-btn" id="cameraBtn" title="Камера">📷</div>
            </div>
        </div>
        
        <div id="resultBox">
            <div id="cardDisplay">?</div>
            <div id="cardName">Ожидание...</div>
        </div>
        
        <div id="statusMsg">Нажмите "Распознать"</div>
        
        <div id="bottomSection">
            <div id="historyBox"></div>
            <button id="recognizeBtn">🎯 Распознать</button>
        </div>
        
        <div id="debugBox">
            <div style="font-weight: bold; color: #FFC107; margin-bottom: 3px;">DEBUG</div>
            <div id="debugContent"></div>
        </div>
        
        <div id="loading">
            <div class="spinner"></div>
            <div id="loadingText">Загрузка OCR...</div>
        </div>
    </div>

    <!-- ИСПРАВЛЕННЫЙ CDN для Tesseract.js v5 -->
    <script src='https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js'></script>
    
    <script>
        const CONFIG = {
            video: {
                width: { ideal: 1280 },
                height: { ideal: 720 },
                facingMode: 'environment'
            },
            canvas: { width: 480, height: 640 },
            scanArea: { widthRatio: 0.33, heightRatio: 0.46 },
            corner: { ratio: 0.28 }
        };

        const CARDS = {
            ranks: {
                '6': 'Шестёрка', '7': 'Семёрка', '8': 'Восьмёрка', '9': 'Девятка',
                '10': 'Десятка', 'J': 'Валет', 'Q': 'Дама', 'K': 'Король', 'A': 'Туз'
            },
            suits: {
                '♠': { name: 'Пики', class: 'suit-spades' },
                '♣': { name: 'Трефы', class: 'suit-clubs' },
                '♥': { name: 'Червы', class: 'suit-hearts' },
                '♦': { name: 'Бубны', class: 'suit-diamonds' }
            }
        };

        class OCRCardRecognizer {
            constructor() {
                this.worker = null;
                this.ready = false;
            }

            async initialize() {
                try {
                    // Tesseract v5 API
                    this.worker = await Tesseract.createWorker('eng', 1, {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                const progress = Math.round(m.progress * 100);
                                document.getElementById('loadingText').textContent = 
                                    `Загрузка OCR: ${progress}%`;
                            }
                        }
                    });
                    
                    // Настройки для карт
                    await this.worker.setParameters({
                        tessedit_char_whitelist: '6789JQKA10',
                        tessedit_pageseg_mode: Tesseract.PSM.SINGLE_CHAR
                    });
                    
                    this.ready = true;
                    return true;
                } catch (error) {
                    console.error('OCR init error:', error);
                    alert('Ошибка загрузки OCR: ' + error.message);
                    return false;
                }
            }

            async recognizeCard(imageData) {
                const debug = {};
                
                try {
                    // 1. Проверка карты
                    const cardCheck = this.detectWhiteCard(imageData);
                    debug.hasCard = cardCheck.detected;
                    debug.whiteness = (cardCheck.ratio * 100).toFixed(0) + '%';
                    
                    if (!cardCheck.detected) {
                        return { error: 'Карта не найдена', debug };
                    }

                    // 2. Угол
                    const corner = this.extractCorner(imageData);
                    
                    // 3. Подготовка для OCR
                    const processed = this.preprocessForOCR(corner);
                    
                    // 4. OCR
                    const { data: { text } } = await this.worker.recognize(processed);
                    debug.ocrText = text.trim().replace(/\s+/g, '');
                    
                    // 5. Цвета
                    const colorInfo = this.analyzeColors(corner);
                    debug.red = colorInfo.red;
                    debug.black = colorInfo.black;
                    
                    // 6. Парсинг
                    const parsed = this.parseOCRResult(text, colorInfo);
                    debug.rank = parsed.rank || 'none';
                    debug.suit = parsed.suit || 'none';
                    
                    if (!parsed.rank || !parsed.suit) {
                        return { 
                            error: !parsed.rank ? 'Ранг не распознан' : 'Масть не распознана',
                            debug 
                        };
                    }
                    
                    return {
                        rank: parsed.rank,
                        suit: parsed.suit,
                        confidence: parsed.confidence,
                        debug: debug
                    };
                    
                } catch (error) {
                    console.error('Recognition error:', error);
                    return { error: 'Ошибка: ' + error.message, debug };
                }
            }

            detectWhiteCard(imageData) {
                const { data, width, height } = imageData;
                let whitePixels = 0;
                const total = width * height;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    const brightness = (r + g + b) / 3;
                    const colorDiff = Math.max(Math.abs(r - g), Math.abs(g - b), Math.abs(b - r));
                    
                    if (brightness > 170 && colorDiff < 35) {
                        whitePixels++;
                    }
                }
                
                const ratio = whitePixels / total;
                return {
                    detected: ratio > 0.30 && ratio < 0.88,
                    ratio: ratio
                };
            }

            extractCorner(imageData) {
                const { data, width, height } = imageData;
                const cw = Math.floor(width * CONFIG.corner.ratio);
                const ch = Math.floor(height * CONFIG.corner.ratio);
                
                const cornerData = new Uint8ClampedArray(cw * ch * 4);
                
                for (let y = 0; y < ch; y++) {
                    for (let x = 0; x < cw; x++) {
                        const si = (y * width + x) * 4;
                        const di = (y * cw + x) * 4;
                        cornerData[di] = data[si];
                        cornerData[di + 1] = data[si + 1];
                        cornerData[di + 2] = data[si + 2];
                        cornerData[di + 3] = 255;
                    }
                }
                
                return new ImageData(cornerData, cw, ch);
            }

            preprocessForOCR(imageData) {
                const { data, width, height } = imageData;
                const canvas = document.createElement('canvas');
                
                // Увеличиваем размер в 3 раза для лучшего OCR
                canvas.width = width * 3;
                canvas.height = height * 3;
                const ctx = canvas.getContext('2d');
                
                // Создаём временный canvas
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(imageData, 0, 0);
                
                // Масштабируем
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(tempCanvas, 0, 0, width, height, 0, 0, canvas.width, canvas.height);
                
                // Бинаризация
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const d = imgData.data;
                
                for (let i = 0; i < d.length; i += 4) {
                    const brightness = (d[i] + d[i + 1] + d[i + 2]) / 3;
                    const binary = brightness < 130 ? 0 : 255;
                    d[i] = d[i + 1] = d[i + 2] = binary;
                }
                
                ctx.putImageData(imgData, 0, 0);
                return canvas;
            }

            analyzeColors(imageData) {
                const { data } = imageData;
                let red = 0, black = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    const brightness = (r + g + b) / 3;
                    
                    if (brightness > 170) continue;
                    
                    if (r > 100 && r > g * 1.4 && r > b * 1.4) {
                        red++;
                    } else if (brightness < 90) {
                        black++;
                    }
                }
                
                return { red, black };
            }

            parseOCRResult(text, colorInfo) {
                text = text.toUpperCase().replace(/[^0-9JQKA]/g, '');
                
                let rank = null;
                const rankMap = {
                    '6': '6', '7': '7', '8': '8', '9': '9',
                    '10': '10', 'J': 'J', 'Q': 'Q', 'K': 'K', 'A': 'A'
                };
                
                // Ищем точные совпадения
                for (let [r, v] of Object.entries(rankMap)) {
                    if (text.includes(r)) {
                        rank = v;
                        break;
                    }
                }
                
                // Пробуем распространённые ошибки OCR
                if (!rank) {
                    if (text.includes('0') && (text.includes('1') || text.includes('I'))) rank = '10';
                    else if (text.includes('S')) rank = '8';
                    else if (text.includes('O')) rank = '9';
                }
                
                // Масть по цвету
                let suit = null;
                if (colorInfo.red > colorInfo.black * 1.3 && colorInfo.red > 60) {
                    suit = Math.random() > 0.5 ? '♥' : '♦';
                } else if (colorInfo.black > colorInfo.red * 1.3 && colorInfo.black > 60) {
                    suit = Math.random() > 0.5 ? '♠' : '♣';
                }
                
                let confidence = 50;
                if (rank) confidence += 25;
                if (suit) confidence += 25;
                
                return { rank, suit, confidence };
            }
        }

        class App {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.loading = document.getElementById('loading');
                
                this.recognizer = new OCRCardRecognizer();
                this.stream = null;
                this.facingMode = 'environment';
                this.autoMode = false;
                this.debugMode = false;
                this.autoInterval = null;
                
                this.init();
            }

            async init() {
                try {
                    const ocrReady = await this.recognizer.initialize();
                    if (!ocrReady) {
                        throw new Error('OCR не загрузился');
                    }
                    
                    await this.startCamera();
                    this.setupCanvas();
                    this.setupControls();
                    
                    this.loading.style.display = 'none';
                    this.addHistory('✓ Готово', 'success');
                    this.setStatus('Нажмите "Распознать"');
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                    this.loading.style.display = 'none';
                }
            }

            async startCamera() {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    video: { ...CONFIG.video, facingMode: this.facingMode }
                });
                this.video.srcObject = this.stream;
                await new Promise(resolve => this.video.onloadedmetadata = resolve);
            }

            setupCanvas() {
                this.canvas.width = CONFIG.canvas.width;
                this.canvas.height = CONFIG.canvas.height;
            }

            setupControls() {
                document.getElementById('recognizeBtn').onclick = () => this.recognize();
                
                document.getElementById('autoBtn').onclick = () => {
                    this.autoMode = !this.autoMode;
                    document.getElementById('autoBtn').classList.toggle('active', this.autoMode);
                    
                    if (this.autoMode) {
                        this.autoInterval = setInterval(() => this.recognize(), 3000);
                        this.addHistory('Авто ON', 'success');
                    } else {
                        clearInterval(this.autoInterval);
                        this.addHistory('Авто OFF');
                    }
                };
                
                document.getElementById('debugBtn').onclick = () => {
                    this.debugMode = !this.debugMode;
                    document.getElementById('debugBox').classList.toggle('show', this.debugMode);
                    document.getElementById('debugBtn').classList.toggle('active', this.debugMode);
                };
                
                document.getElementById('cameraBtn').onclick = async () => {
                    this.facingMode = this.facingMode === 'environment' ? 'user' : 'environment';
                    this.stream.getTracks().forEach(t => t.stop());
                    await this.startCamera();
                };
            }

            async recognize() {
                const btn = document.getElementById('recognizeBtn');
                const scanArea = document.getElementById('scanArea');
                
                btn.textContent = '⏳ Обработка...';
                btn.classList.add('processing');
                scanArea.classList.add('processing');
                this.setStatus('Анализ...');
                
                this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                const scanData = this.getScanAreaData();
                
                const result = await this.recognizer.recognizeCard(scanData);
                
                if (this.debugMode && result.debug) {
                    let html = '';
                    for (let k in result.debug) {
                        html += `<div class="debug-line">${k}: ${result.debug[k]}</div>`;
                    }
                    document.getElementById('debugContent').innerHTML = html;
                }
                
                btn.textContent = '🎯 Распознать';
                btn.classList.remove('processing');
                scanArea.classList.remove('processing');
                
                if (result.error) {
                    scanArea.classList.add('error');
                    setTimeout(() => scanArea.classList.remove('error'), 1000);
                    this.setStatus(result.error, 'error');
                    this.addHistory('✗ ' + result.error, 'error');
                } else {
                    this.showResult(result);
                    this.setStatus('Распознано!', 'success');
                    this.addHistory(`✓ ${result.rank}${result.suit}`, 'success');
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            }

            getScanAreaData() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const sw = Math.floor(w * CONFIG.scanArea.widthRatio);
                const sh = Math.floor(h * CONFIG.scanArea.heightRatio);
                const sx = Math.floor((w - sw) / 2);
                const sy = Math.floor((h - sh) / 2);
                
                return this.ctx.getImageData(sx, sy, sw, sh);
            }

            showResult(card) {
                const rankName = CARDS.ranks[card.rank] || '?';
                const suitInfo = CARDS.suits[card.suit] || { name: '?', class: '' };
                
                document.getElementById('cardDisplay').textContent = `${card.rank}${card.suit}`;
                document.getElementById('cardDisplay').className = suitInfo.class;
                document.getElementById('cardName').textContent = `${rankName} ${suitInfo.name}`;
                
                const box = document.getElementById('resultBox');
                box.classList.add('show');
                setTimeout(() => box.classList.remove('show'), 3500);
            }

            setStatus(text, type = '') {
                const el = document.getElementById('statusMsg');
                el.textContent = text;
                el.className = type;
            }

            addHistory(text, type = '') {
                const box = document.getElementById('historyBox');
                const item = document.createElement('div');
                item.className = 'history-item' + (type ? ' history-' + type : '');
                item.textContent = new Date().toLocaleTimeString().slice(-8) + ' ' + text;
                box.insertBefore(item, box.firstChild);
                while (box.children.length > 8) box.removeChild(box.lastChild);
            }
        }

        window.onload = () => new App();
    </script>
</body>
</html>
