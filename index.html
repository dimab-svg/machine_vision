<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Распознавание карт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        /* Зона сканирования */
        #scanArea {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 280px;
            border: 3px solid #4CAF50;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
        }

        #scanArea.analyzing {
            border-color: #FFC107;
            animation: analyzing 0.5s infinite;
        }

        #scanArea.success {
            border-color: #4CAF50;
            animation: success 0.3s;
        }

        #scanArea.fail {
            border-color: #f44336;
            animation: shake 0.3s;
        }

        @keyframes analyzing {
            0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6), 0 0 20px #FFC107; }
            50% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6), 0 0 40px #FFC107; }
        }

        @keyframes success {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(-48%, -50%); }
            75% { transform: translate(-52%, -50%); }
        }

        /* Статус распознавания */
        #scanStatus {
            position: absolute;
            bottom: calc(50% + 150px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.3s;
        }

        #scanStatus.analyzing {
            background: rgba(255, 193, 7, 0.95);
        }

        #scanStatus.error {
            background: rgba(244, 67, 54, 0.95);
        }

        /* Панель результатов */
        #resultPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            min-width: 120px;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s;
            pointer-events: none;
        }

        #resultPanel.show {
            opacity: 1;
            transform: scale(1);
        }

        .card-display {
            font-size: 48px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .card-name {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
            font-weight: 500;
        }

        .suit-hearts, .suit-diamonds {
            color: #e53935;
        }

        .suit-spades, .suit-clubs {
            color: #212121;
        }

        #confidence {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        /* Контролы */
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: all;
        }

        button {
            background: rgba(76, 175, 80, 0.95);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        button:active {
            transform: scale(0.95);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
        }

        button.primary {
            background: #FFC107;
            font-size: 16px;
            padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .btn-icon {
            font-size: 16px;
        }

        /* Лог */
        #logPanel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            padding: 8px 12px;
            max-width: 200px;
            pointer-events: none;
        }

        #logTitle {
            color: #4CAF50;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #log {
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            max-height: 120px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 2px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-error {
            color: #f44336;
        }

        .log-success {
            color: #4CAF50;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Статистика */
        #statsPanel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            gap: 12px;
            pointer-events: none;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #4CAF50;
            line-height: 1;
        }

        .stat-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 2px;
            text-transform: uppercase;
        }

        /* Debug панель */
        #debugPanel {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 10px;
            font-family: monospace;
            display: none;
            max-width: 180px;
        }

        #debugPanel.show {
            display: block;
        }

        .debug-item {
            margin: 4px 0;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(229, 57, 53, 0.95);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            max-width: 80%;
            display: none;
        }

        #error.show {
            display: block;
        }

        #log::-webkit-scrollbar {
            width: 3px;
        }

        #log::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        #log::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div id="overlay">
            <div id="scanArea"></div>
            <div id="scanStatus">📷 Наведите на карту</div>
        </div>

        <div id="resultPanel">
            <div class="card-display" id="cardDisplay">?</div>
            <div class="card-name" id="cardName">Ожидание...</div>
            <div id="confidence"></div>
        </div>

        <div id="controls">
            <button id="recognizeBtn" class="primary">
                <span class="btn-icon">🎯</span>
                <span>Распознать</span>
            </button>
            <button id="toggleAuto" class="secondary">
                <span class="btn-icon">🔄</span>
                <span id="autoLabel">Авто: Выкл</span>
            </button>
            <button id="toggleDebug" class="secondary">
                <span class="btn-icon">🐛</span>
            </button>
            <button id="switchCamera" class="secondary">
                <span class="btn-icon">📷</span>
            </button>
        </div>

        <div id="debugPanel">
            <div style="font-weight: bold; margin-bottom: 5px;">DEBUG</div>
            <div id="debugContent"></div>
        </div>

        <div id="logPanel">
            <div id="logTitle">История</div>
            <div id="log"></div>
        </div>

        <div id="statsPanel">
            <div class="stat">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Карт</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-label">Успех</div>
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div id="loading-text">Инициализация...</div>
        </div>

        <div id="error">
            <h3>❌ Ошибка</h3>
            <p id="errorMessage"></p>
            <button onclick="location.reload()">Перезагрузить</button>
        </div>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        
        const CONFIG = {
            video: {
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                facingMode: 'environment'
            },
            
            processing: {
                canvasWidth: 640,
                canvasHeight: 480
            },
            
            scanArea: {
                x: 0.5,
                y: 0.5,
                width: 0.31,
                height: 0.44
            },
            
            recognition: {
                minWhitePixels: 3000,     // Снижен порог
                minColorPixels: 50,        // Снижен порог
                cornerSize: 0.35,
                minConfidence: 40          // Снижен порог
            }
        };

        // ==================== КАРТЫ ====================
        
        const CARDS = {
            ranks: {
                '6': { name: '6', value: 6 },
                '7': { name: '7', value: 7 },
                '8': { name: '8', value: 8 },
                '9': { name: '9', value: 9 },
                '10': { name: '10', value: 10 },
                'J': { name: 'Валет', value: 11 },
                'Q': { name: 'Дама', value: 12 },
                'K': { name: 'Король', value: 13 },
                'A': { name: 'Туз', value: 14 }
            },
            suits: {
                '♠': { name: 'Пики', color: 'black', class: 'suit-spades' },
                '♣': { name: 'Трефы', color: 'black', class: 'suit-clubs' },
                '♥': { name: 'Червы', color: 'red', class: 'suit-hearts' },
                '♦': { name: 'Бубны', color: 'red', class: 'suit-diamonds' }
            }
        };

        // ==================== ДВИЖОК РАСПОЗНАВАНИЯ ====================
        
        class CardRecognitionEngine {
            constructor() {
                this.lastDebugInfo = {};
            }

            recognizeCard(imageData) {
                const debug = {};
                
                try {
                    // 1. Детекция карты
                    const cardPresence = this.detectCardPresence(imageData);
                    debug.cardPresent = cardPresence.present;
                    debug.whitePixels = cardPresence.whitePixels;
                    debug.whiteRatio = (cardPresence.whiteRatio * 100).toFixed(1) + '%';
                    
                    if (!cardPresence.present) {
                        this.lastDebugInfo = debug;
                        return { error: 'Карта не обнаружена', debug };
                    }

                    // 2. Извлекаем угол
                    const corner = this.extractCorner(imageData);
                    
                    // 3. Анализируем цвета
                    const colors = this.analyzeColors(corner);
                    debug.redPixels = colors.redPixels;
                    debug.blackPixels = colors.blackPixels;
                    debug.coloredPixels = colors.redPixels + colors.blackPixels;
                    
                    // 4. Определяем масть
                    const suit = this.detectSuit(colors);
                    debug.detectedSuit = suit || 'none';
                    
                    // 5. Определяем ранг (упрощённо)
                    const rank = this.detectRank(corner);
                    debug.detectedRank = rank || 'none';
                    
                    this.lastDebugInfo = debug;
                    
                    if (!suit && !rank) {
                        return { error: 'Символы не распознаны', debug };
                    }
                    
                    // Вычисляем уверенность
                    let confidence = 50;
                    if (suit) confidence += 25;
                    if (rank) confidence += 25;
                    
                    return {
                        rank: rank || '?',
                        suit: suit || '?',
                        confidence: confidence,
                        debug: debug
                    };
                    
                } catch (error) {
                    console.error('Recognition error:', error);
                    return { error: error.message, debug };
                }
            }

            detectCardPresence(imageData) {
                const data = imageData.data;
                let whitePixels = 0;
                const totalPixels = data.length / 4;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    const brightness = (r + g + b) / 3;
                    
                    if (brightness > 180 && 
                        Math.abs(r - g) < 30 && 
                        Math.abs(g - b) < 30) {
                        whitePixels++;
                    }
                }

                const whiteRatio = whitePixels / totalPixels;
                
                return {
                    present: whitePixels > CONFIG.recognition.minWhitePixels && 
                             whiteRatio > 0.3 && whiteRatio < 0.95,
                    whitePixels: whitePixels,
                    whiteRatio: whiteRatio
                };
            }

            extractCorner(imageData) {
                const { width, height, data } = imageData;
                const cornerWidth = Math.floor(width * CONFIG.recognition.cornerSize);
                const cornerHeight = Math.floor(height * CONFIG.recognition.cornerSize);

                const cornerData = new Uint8ClampedArray(cornerWidth * cornerHeight * 4);

                for (let y = 0; y < cornerHeight; y++) {
                    for (let x = 0; x < cornerWidth; x++) {
                        const srcIndex = (y * width + x) * 4;
                        const dstIndex = (y * cornerWidth + x) * 4;

                        cornerData[dstIndex] = data[srcIndex];
                        cornerData[dstIndex + 1] = data[srcIndex + 1];
                        cornerData[dstIndex + 2] = data[srcIndex + 2];
                        cornerData[dstIndex + 3] = data[srcIndex + 3];
                    }
                }

                return new ImageData(cornerData, cornerWidth, cornerHeight);
            }

            analyzeColors(corner) {
                const data = corner.data;
                let redPixels = 0;
                let blackPixels = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    const brightness = (r + g + b) / 3;
                    
                    if (brightness > 180) continue;
                    
                    if (r > 120 && g < 100 && b < 100) {
                        redPixels++;
                    } else if (brightness < 100) {
                        blackPixels++;
                    }
                }

                return { redPixels, blackPixels };
            }

            detectSuit(colors) {
                const { redPixels, blackPixels } = colors;
                
                if (redPixels < CONFIG.recognition.minColorPixels && 
                    blackPixels < CONFIG.recognition.minColorPixels) {
                    return null;
                }
                
                if (redPixels > blackPixels) {
                    return Math.random() > 0.5 ? '♥' : '♦';
                } else {
                    return Math.random() > 0.5 ? '♠' : '♣';
                }
            }

            detectRank(corner) {
                // Упрощённая эвристика на основе количества тёмных пикселей
                const data = corner.data;
                let darkPixels = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    if (brightness < 100) darkPixels++;
                }
                
                const ranks = Object.keys(CARDS.ranks);
                
                // Случайный выбор для демонстрации
                // TODO: Заменить на настоящее распознавание
                if (darkPixels > 100) {
                    return ranks[Math.floor(Math.random() * ranks.length)];
                }
                
                return null;
            }

            getLastDebugInfo() {
                return this.lastDebugInfo;
            }
        }

        // ==================== ГЛАВНЫЙ КЛАСС ====================
        
        class CardRecognizer {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.loading = document.getElementById('loading');
                this.error = document.getElementById('error');
                this.resultPanel = document.getElementById('resultPanel');
                this.scanStatus = document.getElementById('scanStatus');
                this.scanArea = document.getElementById('scanArea');
                this.log = document.getElementById('log');
                this.debugPanel = document.getElementById('debugPanel');
                this.debugContent = document.getElementById('debugContent');
                
                this.stream = null;
                this.currentFacingMode = 'environment';
                this.recognitionEngine = new CardRecognitionEngine();
                
                this.autoMode = false;
                this.autoInterval = null;
                this.debugMode = false;
                
                this.stats = {
                    total: 0,
                    success: 0
                };
                
                this.init();
            }

            async init() {
                try {
                    this.addLog('Запуск...');
                    await this.startCamera();
                    this.setupCanvas();
                    this.setupControls();
                    this.loading.style.display = 'none';
                    this.addLog('✓ Готово', 'success');
                    this.updateStatus('Нажмите "Распознать"');
                } catch (err) {
                    this.showError('Ошибка: ' + err.message);
                }
            }

            async startCamera() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            ...CONFIG.video,
                            facingMode: this.currentFacingMode
                        }
                    });
                    
                    this.video.srcObject = this.stream;
                    
                    await new Promise(resolve => {
                        this.video.onloadedmetadata = resolve;
                    });
                    
                    this.addLog(`✓ Камера ${this.video.videoWidth}x${this.video.videoHeight}`);
                } catch (err) {
                    throw new Error('Нет доступа к камере');
                }
            }

            setupCanvas() {
                this.canvas.width = CONFIG.processing.canvasWidth;
                this.canvas.height = CONFIG.processing.canvasHeight;
            }

            setupControls() {
                // Кнопка распознавания
                document.getElementById('recognizeBtn').addEventListener('click', () => {
                    this.recognizeNow();
                });

                // Переключение авто-режима
                document.getElementById('toggleAuto').addEventListener('click', () => {
                    this.autoMode = !this.autoMode;
                    document.getElementById('autoLabel').textContent = 
                        `Авто: ${this.autoMode ? 'Вкл' : 'Выкл'}`;
                    
                    if (this.autoMode) {
                        this.startAutoRecognition();
                        this.addLog('Авто-режим включен');
                    } else {
                        this.stopAutoRecognition();
                        this.addLog('Авто-режим выключен');
                    }
                });

                // Debug режим
                document.getElementById('toggleDebug').addEventListener('click', () => {
                    this.debugMode = !this.debugMode;
                    if (this.debugMode) {
                        this.debugPanel.classList.add('show');
                        this.addLog('Debug ON', 'success');
                    } else {
                        this.debugPanel.classList.remove('show');
                        this.addLog('Debug OFF');
                    }
                });

                // Переключение камеры
                document.getElementById('switchCamera').addEventListener('click', async () => {
                    this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                    }
                    this.addLog('Переключение камеры...');
                    await this.startCamera();
                });
            }

            startAutoRecognition() {
                this.autoInterval = setInterval(() => {
                    this.recognizeNow();
                }, 2000);
            }

            stopAutoRecognition() {
                if (this.autoInterval) {
                    clearInterval(this.autoInterval);
                    this.autoInterval = null;
                }
            }

            async recognizeNow() {
                this.scanArea.className = 'analyzing';
                this.updateStatus('Анализ...', 'analyzing');
                
                // Захватываем кадр
                this.ctx.drawImage(
                    this.video,
                    0, 0,
                    this.canvas.width,
                    this.canvas.height
                );

                // Извлекаем зону сканирования
                const scanRegion = this.extractScanRegion();

                // Распознаём
                const result = this.recognitionEngine.recognizeCard(scanRegion);
                
                // Обновляем debug
                if (this.debugMode) {
                    this.updateDebugInfo(result.debug || {});
                }
                
                if (result.error) {
                    this.scanArea.className = 'fail';
                    this.updateStatus(result.error, 'error');
                    this.addLog(`✗ ${result.error}`, 'error');
                    
                    setTimeout(() => {
                        this.scanArea.className = '';
                        if (!this.autoMode) {
                            this.updateStatus('Нажмите "Распознать"');
                        }
                    }, 1000);
                    
                    return;
                }
                
                // Успешное распознавание
                this.scanArea.className = 'success';
                this.updateStatus('Распознано!', 'success');
                this.displayRecognizedCard(result);
                
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
                
                setTimeout(() => {
                    this.scanArea.className = '';
                    if (!this.autoMode) {
                        this.updateStatus('Нажмите "Распознать"');
                    }
                }, 1000);
            }

            extractScanRegion() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                const x = Math.floor(w * (CONFIG.scanArea.x - CONFIG.scanArea.width / 2));
                const y = Math.floor(h * (CONFIG.scanArea.y - CONFIG.scanArea.height / 2));
                const width = Math.floor(w * CONFIG.scanArea.width);
                const height = Math.floor(h * CONFIG.scanArea.height);

                return this.ctx.getImageData(x, y, width, height);
            }

            displayRecognizedCard(card) {
                const { rank, suit, confidence } = card;
                
                const rankInfo = CARDS.ranks[rank] || { name: '?' };
                const suitInfo = CARDS.suits[suit] || { name: '?', class: '' };
                
                const display = document.getElementById('cardDisplay');
                display.textContent = `${rank}${suit}`;
                display.className = `card-display ${suitInfo.class}`;
                
                document.getElementById('cardName').textContent = 
                    `${rankInfo.name} ${suitInfo.name}`;
                
                document.getElementById('confidence').textContent = 
                    `${Math.round(confidence)}%`;
                
                this.resultPanel.classList.add('show');
                
                this.stats.total++;
                this.stats.success++;
                this.updateStats();
                
                this.addLog(`✓ ${rank}${suit} (${Math.round(confidence)}%)`, 'success');
                
                setTimeout(() => {
                    this.resultPanel.classList.remove('show');
                }, 3000);
            }

            updateStatus(text, type = '') {
                this.scanStatus.textContent = text;
                this.scanStatus.className = type;
            }

            updateDebugInfo(debug) {
                let html = '';
                for (let key in debug) {
                    html += `<div class="debug-item">${key}: ${debug[key]}</div>`;
                }
                this.debugContent.innerHTML = html;
            }

            updateStats() {
                document.getElementById('totalCards').textContent = this.stats.success;
                const rate = this.stats.total > 0 
                    ? Math.round(this.stats.success / this.stats.total * 100) 
                    : 0;
                document.getElementById('successRate').textContent = rate + '%';
            }

            addLog(message, type = '') {
                const entry = document.createElement('div');
                entry.className = 'log-entry' + (type ? ' log-' + type : '');
                
                const time = new Date().toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                
                entry.textContent = `${time.slice(-8)} ${message}`;
                this.log.insertBefore(entry, this.log.firstChild);
                
                while (this.log.children.length > 10) {
                    this.log.removeChild(this.log.lastChild);
                }
            }

            showError(message) {
                document.getElementById('errorMessage').textContent = message;
                this.error.classList.add('show');
                this.loading.style.display = 'none';
            }
        }

        // ==================== ЗАПУСК ====================
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Ваш браузер не поддерживает доступ к камере');
        } else {
            window.addEventListener('load', () => {
                new CardRecognizer();
            });
        }
    </script>
</body>
</html>
