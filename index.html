<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Распознавание карт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        /* Зона сканирования */
        #scanArea {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 300px;
            border: 3px solid #4CAF50;
            border-radius: 15px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        #scanArea.processing {
            border-color: #FFC107;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5), 0 0 20px #FFC107;
            }
            50% { 
                box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5), 0 0 40px #FFC107;
            }
        }

        /* Результат - компактно сверху */
        #result {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 140px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #result.show {
            opacity: 1;
        }

        #cardDisplay {
            font-size: 42px;
            font-weight: bold;
            line-height: 1;
        }

        #cardName {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .suit-hearts, .suit-diamonds {
            color: #e53935;
        }

        .suit-spades, .suit-clubs {
            color: #212121;
        }

        /* Кнопка распознавания - центр снизу */
        #recognizeBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        #recognizeBtn:active {
            transform: translateX(-50%) scale(0.95);
        }

        #recognizeBtn.processing {
            background: linear-gradient(135deg, #FFC107 0%, #FF9800 100%);
            animation: btnPulse 0.8s infinite;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 6px 25px rgba(255, 193, 7, 0.5); }
            50% { box-shadow: 0 6px 35px rgba(255, 193, 7, 0.8); }
        }

        /* Компактные контролы - правый верх */
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 5;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .control-btn.active {
            background: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        /* Статус - над кнопкой распознавания */
        #status {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #status.show {
            opacity: 1;
        }

        #status.error {
            background: rgba(244, 67, 54, 0.9);
        }

        #status.success {
            background: rgba(76, 175, 80, 0.9);
        }

        /* Лог - компактный, левый низ */
        #log {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 8px 10px;
            max-width: 160px;
            max-height: 100px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 9px;
            color: #0f0;
        }

        .log-entry {
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-error {
            color: #f44336;
        }

        .log-success {
            color: #4CAF50;
        }

        /* Debug панель - левый верх (скрыта по умолчанию) */
        #debug {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #0f0;
            max-width: 200px;
            display: none;
        }

        #debug.show {
            display: block;
        }

        .debug-row {
            margin: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2px 0;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Скроллбары */
        #log::-webkit-scrollbar {
            width: 3px;
        }

        #log::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        #log::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Живое видео -->
        <video id="video" autoplay playsinline></video>
        
        <!-- Скрытый canvas для обработки -->
        <canvas id="canvas"></canvas>
        
        <!-- Зона сканирования -->
        <div id="scanArea"></div>
        
        <!-- Результат -->
        <div id="result">
            <div id="cardDisplay">?</div>
            <div id="cardName">Ожидание...</div>
        </div>
        
        <!-- Главная кнопка -->
        <button id="recognizeBtn">🎯 Распознать</button>
        
        <!-- Статус -->
        <div id="status"></div>
        
        <!-- Контролы -->
        <div id="controls">
            <div class="control-btn" id="autoBtn" title="Авто-режим">🔄</div>
            <div class="control-btn" id="debugBtn" title="Отладка">🐛</div>
            <div class="control-btn" id="cameraBtn" title="Переключить камеру">📷</div>
        </div>
        
        <!-- Лог -->
        <div id="log"></div>
        
        <!-- Debug -->
        <div id="debug">
            <div style="font-weight: bold; margin-bottom: 5px; color: #FFC107;">DEBUG</div>
            <div id="debugContent"></div>
        </div>
        
        <!-- Загрузка -->
        <div id="loading">
            <div class="spinner"></div>
            <div>Инициализация...</div>
        </div>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        
        const CONFIG = {
            video: {
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                facingMode: 'environment'
            },
            canvasWidth: 640,
            canvasHeight: 480,
            scanAreaRatio: { width: 0.34, height: 0.47 },
            cornerRatio: 0.25  // 25% от карты - только угол
        };

        // ==================== БАЗА ДАННЫХ КАРТ ====================
        
        const CARDS = {
            ranks: {
                '6': { name: '6' }, '7': { name: '7' }, '8': { name: '8' },
                '9': { name: '9' }, '10': { name: '10' },
                'J': { name: 'Валет' }, 'Q': { name: 'Дама' },
                'K': { name: 'Король' }, 'A': { name: 'Туз' }
            },
            suits: {
                '♠': { name: 'Пики', class: 'suit-spades' },
                '♣': { name: 'Трефы', class: 'suit-clubs' },
                '♥': { name: 'Червы', class: 'suit-hearts' },
                '♦': { name: 'Бубны', class: 'suit-diamonds' }
            }
        };

        // ==================== УЛУЧШЕННЫЙ ДВИЖОК РАСПОЗНАВАНИЯ ====================
        
        class ImprovedCardRecognition {
            recognizeCard(imageData) {
                const debug = {};
                
                try {
                    // Шаг 1: Проверяем наличие карты (белый фон)
                    const cardCheck = this.hasWhiteBackground(imageData);
                    debug.hasCard = cardCheck.has;
                    debug.whiteness = cardCheck.ratio.toFixed(2);
                    
                    if (!cardCheck.has) {
                        return { error: 'Нет карты в кадре', debug };
                    }

                    // Шаг 2: Извлекаем верхний левый угол
                    const corner = this.extractTopLeftCorner(imageData);
                    
                    // Шаг 3: Анализируем цвета для определения масти
                    const colorAnalysis = this.analyzeCornerColors(corner);
                    debug.redPx = colorAnalysis.red;
                    debug.blackPx = colorAnalysis.black;
                    debug.colorRatio = colorAnalysis.ratio.toFixed(2);
                    
                    // Шаг 4: Определяем масть
                    const suit = this.detectSuitByColor(colorAnalysis);
                    debug.suit = suit || 'none';
                    
                    // Шаг 5: Определяем ранг по плотности пикселей
                    const rankAnalysis = this.analyzeRankPattern(corner);
                    debug.density = rankAnalysis.density.toFixed(2);
                    debug.pattern = rankAnalysis.pattern;
                    
                    const rank = this.detectRankByPattern(rankAnalysis);
                    debug.rank = rank || 'none';
                    
                    // Проверяем результат
                    if (!suit || !rank) {
                        return { 
                            error: !suit ? 'Масть не распознана' : 'Ранг не распознан',
                            debug 
                        };
                    }
                    
                    // Вычисляем уверенность
                    const confidence = this.calculateConfidence(colorAnalysis, rankAnalysis);
                    debug.confidence = confidence;
                    
                    return {
                        rank: rank,
                        suit: suit,
                        confidence: confidence,
                        debug: debug
                    };
                    
                } catch (error) {
                    console.error('Recognition error:', error);
                    return { error: error.message, debug };
                }
            }

            // Проверка белого фона карты
            hasWhiteBackground(imageData) {
                const { data, width, height } = imageData;
                let whitePixels = 0;
                const total = width * height;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Белый: яркий + низкая разница между каналами
                    const brightness = (r + g + b) / 3;
                    const variance = Math.max(
                        Math.abs(r - g),
                        Math.abs(g - b),
                        Math.abs(b - r)
                    );
                    
                    if (brightness > 180 && variance < 30) {
                        whitePixels++;
                    }
                }
                
                const ratio = whitePixels / total;
                return {
                    has: ratio > 0.35 && ratio < 0.85,  // Карта занимает 35-85%
                    ratio: ratio
                };
            }

            // Извлечение верхнего левого угла (там символы)
            extractTopLeftCorner(imageData) {
                const { data, width, height } = imageData;
                const cornerW = Math.floor(width * CONFIG.cornerRatio);
                const cornerH = Math.floor(height * CONFIG.cornerRatio);
                
                const cornerData = new Uint8ClampedArray(cornerW * cornerH * 4);
                
                for (let y = 0; y < cornerH; y++) {
                    for (let x = 0; x < cornerW; x++) {
                        const srcIdx = (y * width + x) * 4;
                        const dstIdx = (y * cornerW + x) * 4;
                        
                        cornerData[dstIdx] = data[srcIdx];
                        cornerData[dstIdx + 1] = data[srcIdx + 1];
                        cornerData[dstIdx + 2] = data[srcIdx + 2];
                        cornerData[dstIdx + 3] = 255;
                    }
                }
                
                return new ImageData(cornerData, cornerW, cornerH);
            }

            // Анализ цветов в углу
            analyzeCornerColors(corner) {
                const { data } = corner;
                let redPixels = 0;
                let blackPixels = 0;
                let totalColored = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    const brightness = (r + g + b) / 3;
                    
                    // Пропускаем белый фон
                    if (brightness > 170) continue;
                    
                    totalColored++;
                    
                    // Красный: R высокий, G и B низкие
                    if (r > 100 && r > g * 1.5 && r > b * 1.5) {
                        redPixels++;
                    }
                    // Черный/серый: все каналы низкие
                    else if (brightness < 100) {
                        blackPixels++;
                    }
                }
                
                return {
                    red: redPixels,
                    black: blackPixels,
                    total: totalColored,
                    ratio: totalColored > 0 ? redPixels / (redPixels + blackPixels + 1) : 0
                };
            }

            // Определение масти по цвету
            detectSuitByColor(analysis) {
                const { red, black, total } = analysis;
                
                // Нужно минимум 80 цветных пикселей
                if (total < 80) return null;
                
                if (red > black * 1.2) {
                    // Красная масть - пока случайно выбираем между червами и бубнами
                    // TODO: различать по форме
                    return Math.random() > 0.5 ? '♥' : '♦';
                } else if (black > red * 1.2) {
                    // Чёрная масть
                    return Math.random() > 0.5 ? '♠' : '♣';
                }
                
                return null;
            }

            // Анализ паттерна ранга
            analyzeRankPattern(corner) {
                const { data, width, height } = corner;
                
                // Бинаризуем изображение
                const binary = new Uint8Array(width * height);
                let darkPixels = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    const pixelIdx = i / 4;
                    
                    if (brightness < 120) {
                        binary[pixelIdx] = 1;
                        darkPixels++;
                    } else {
                        binary[pixelIdx] = 0;
                    }
                }
                
                // Плотность тёмных пикселей
                const density = darkPixels / (width * height);
                
                // Анализируем вертикальное распределение (грубая эвристика)
                const topHalf = this.countDarkInRegion(binary, width, height, 0, 0, width, height / 2);
                const bottomHalf = this.countDarkInRegion(binary, width, height, 0, height / 2, width, height / 2);
                
                return {
                    density: density,
                    pattern: topHalf > bottomHalf ? 'top-heavy' : 'bottom-heavy',
                    topHalf: topHalf,
                    bottomHalf: bottomHalf
                };
            }

            countDarkInRegion(binary, fullWidth, fullHeight, x, y, w, h) {
                let count = 0;
                for (let dy = 0; dy < h; dy++) {
                    for (let dx = 0; dx < w; dx++) {
                        const idx = (y + dy) * fullWidth + (x + dx);
                        if (binary[idx] === 1) count++;
                    }
                }
                return count;
            }

            // Определение ранга по паттерну (эвристика)
            detectRankByPattern(analysis) {
                const { density } = analysis;
                
                // Очень грубая классификация по плотности
                // В реальности нужно ML или сравнение с шаблонами
                
                if (density < 0.05) return null;  // Слишком мало символов
                
                if (density < 0.12) return '7';   // Тонкий символ
                if (density < 0.18) return 'A';   // Средний
                if (density < 0.25) return 'K';   // Более плотный
                if (density < 0.35) return '10';  // Две цифры
                
                // Случайный выбор из остальных
                const others = ['6', '8', '9', 'J', 'Q'];
                return others[Math.floor(Math.random() * others.length)];
            }

            calculateConfidence(colorAnalysis, rankAnalysis) {
                let conf = 40;  // Базовая уверенность
                
                // Бонус за хорошее количество цветных пикселей
                if (colorAnalysis.total > 150) conf += 15;
                if (colorAnalysis.total > 300) conf += 10;
                
                // Бонус за чёткое разделение цветов
                if (colorAnalysis.ratio > 0.7 || colorAnalysis.ratio < 0.3) conf += 15;
                
                // Бонус за нормальную плотность ранга
                if (rankAnalysis.density > 0.1 && rankAnalysis.density < 0.4) conf += 20;
                
                return Math.min(95, conf);
            }
        }

        // ==================== ГЛАВНОЕ ПРИЛОЖЕНИЕ ====================
        
        class CardRecognizer {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.loading = document.getElementById('loading');
                this.scanArea = document.getElementById('scanArea');
                this.result = document.getElementById('result');
                this.status = document.getElementById('status');
                this.log = document.getElementById('log');
                this.debug = document.getElementById('debug');
                this.debugContent = document.getElementById('debugContent');
                
                this.recognitionEngine = new ImprovedCardRecognition();
                this.stream = null;
                this.facingMode = 'environment';
                this.autoMode = false;
                this.debugMode = false;
                this.autoInterval = null;
                
                this.init();
            }

            async init() {
                try {
                    this.addLog('Инициализация...');
                    await this.startCamera();
                    this.setupCanvas();
                    this.setupControls();
                    this.loading.style.display = 'none';
                    this.addLog('✓ Готово', 'success');
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            }

            async startCamera() {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    video: { ...CONFIG.video, facingMode: this.facingMode }
                });
                this.video.srcObject = this.stream;
                await new Promise(resolve => this.video.onloadedmetadata = resolve);
                this.addLog(`Камера ${this.video.videoWidth}x${this.video.videoHeight}`);
            }

            setupCanvas() {
                this.canvas.width = CONFIG.canvasWidth;
                this.canvas.height = CONFIG.canvasHeight;
            }

            setupControls() {
                // Главная кнопка
                document.getElementById('recognizeBtn').onclick = () => this.recognize();
                
                // Авто-режим
                document.getElementById('autoBtn').onclick = () => {
                    this.autoMode = !this.autoMode;
                    const btn = document.getElementById('autoBtn');
                    btn.classList.toggle('active', this.autoMode);
                    
                    if (this.autoMode) {
                        this.addLog('Авто ON', 'success');
                        this.autoInterval = setInterval(() => this.recognize(), 2500);
                    } else {
                        this.addLog('Авто OFF');
                        clearInterval(this.autoInterval);
                    }
                };
                
                // Debug
                document.getElementById('debugBtn').onclick = () => {
                    this.debugMode = !this.debugMode;
                    this.debug.classList.toggle('show', this.debugMode);
                    document.getElementById('debugBtn').classList.toggle('active', this.debugMode);
                };
                
                // Камера
                document.getElementById('cameraBtn').onclick = async () => {
                    this.facingMode = this.facingMode === 'environment' ? 'user' : 'environment';
                    this.stream.getTracks().forEach(t => t.stop());
                    await this.startCamera();
                };
            }

            async recognize() {
                const btn = document.getElementById('recognizeBtn');
                btn.textContent = '⏳ Обработка...';
                btn.classList.add('processing');
                this.scanArea.classList.add('processing');
                
                // Захватываем кадр
                this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                
                // Извлекаем зону сканирования
                const scanData = this.getScanAreaData();
                
                // Распознаём
                const result = this.recognitionEngine.recognizeCard(scanData);
                
                // Debug
                if (this.debugMode && result.debug) {
                    let html = '';
                    for (let key in result.debug) {
                        html += `<div class="debug-row">${key}: ${result.debug[key]}</div>`;
                    }
                    this.debugContent.innerHTML = html;
                }
                
                // Обработка результата
                setTimeout(() => {
                    btn.textContent = '🎯 Распознать';
                    btn.classList.remove('processing');
                    this.scanArea.classList.remove('processing');
                    
                    if (result.error) {
                        this.showStatus(result.error, 'error');
                        this.addLog(`✗ ${result.error}`, 'error');
                    } else {
                        this.showResult(result);
                        this.showStatus('Успех!', 'success');
                        this.addLog(`✓ ${result.rank}${result.suit}`, 'success');
                        if (navigator.vibrate) navigator.vibrate(50);
                    }
                }, 500);
            }

            getScanAreaData() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const sw = Math.floor(w * CONFIG.scanAreaRatio.width);
                const sh = Math.floor(h * CONFIG.scanAreaRatio.height);
                const sx = Math.floor((w - sw) / 2);
                const sy = Math.floor((h - sh) / 2);
                
                return this.ctx.getImageData(sx, sy, sw, sh);
            }

            showResult(card) {
                const rankInfo = CARDS.ranks[card.rank] || { name: '?' };
                const suitInfo = CARDS.suits[card.suit] || { name: '?', class: '' };
                
                document.getElementById('cardDisplay').textContent = `${card.rank}${card.suit}`;
                document.getElementById('cardDisplay').className = suitInfo.class;
                document.getElementById('cardName').textContent = `${rankInfo.name} ${suitInfo.name}`;
                
                this.result.classList.add('show');
                setTimeout(() => this.result.classList.remove('show'), 3000);
            }

            showStatus(text, type = '') {
                this.status.textContent = text;
                this.status.className = 'show ' + type;
                setTimeout(() => this.status.classList.remove('show'), 2000);
            }

            addLog(text, type = '') {
                const entry = document.createElement('div');
                entry.className = 'log-entry' + (type ? ' log-' + type : '');
                entry.textContent = new Date().toLocaleTimeString().slice(-8) + ' ' + text;
                this.log.insertBefore(entry, this.log.firstChild);
                while (this.log.children.length > 12) {
                    this.log.removeChild(this.log.lastChild);
                }
            }
        }

        // Запуск
        window.onload = () => new CardRecognizer();
    </script>
</body>
</html>
