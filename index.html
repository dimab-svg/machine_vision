<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Распознавание карт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        /* Зона сканирования - центрирована */
        #scanArea {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 280px;
            border: 3px solid #4CAF50;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                border-color: #4CAF50;
                box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6), 
                            0 0 20px #4CAF50;
            }
            50% { 
                border-color: #81C784;
                box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6), 
                            0 0 30px #4CAF50;
            }
        }

        /* Подсказка над зоной сканирования */
        #scanHint {
            position: absolute;
            bottom: calc(50% + 150px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            font-weight: 500;
        }

        /* Компактная панель результатов - сверху справа */
        #resultPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            min-width: 120px;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s;
            pointer-events: none;
        }

        #resultPanel.show {
            opacity: 1;
            transform: scale(1);
        }

        .card-display {
            font-size: 48px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .card-name {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
            font-weight: 500;
        }

        .suit-hearts, .suit-diamonds {
            color: #e53935;
        }

        .suit-spades, .suit-clubs {
            color: #212121;
        }

        #confidence {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        /* Компактный лог - снизу слева */
        #logPanel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            padding: 8px 12px;
            max-width: 140px;
            pointer-events: none;
        }

        #logTitle {
            color: #4CAF50;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #log {
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            max-height: 80px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 2px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Статистика - снизу справа */
        #statsPanel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            gap: 12px;
            pointer-events: none;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #4CAF50;
            line-height: 1;
        }

        .stat-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 2px;
            text-transform: uppercase;
        }

        /* Контролы - сверху слева */
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            pointer-events: all;
        }

        button {
            background: rgba(76, 175, 80, 0.95);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:active {
            transform: scale(0.95);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
        }

        /* Иконки в кнопках */
        .btn-icon {
            font-size: 16px;
        }

        /* Загрузка */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 14px;
            opacity: 0.9;
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(229, 57, 53, 0.95);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            max-width: 80%;
            display: none;
        }

        #error.show {
            display: block;
        }

        #error h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        #error p {
            font-size: 13px;
            opacity: 0.9;
        }

        #error button {
            margin-top: 15px;
            background: white;
            color: #e53935;
        }

        /* Скроллбар для лога */
        #log::-webkit-scrollbar {
            width: 3px;
        }

        #log::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        #log::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Видеопоток -->
        <video id="video" autoplay playsinline></video>
        
        <!-- Canvas для обработки -->
        <canvas id="canvas"></canvas>
        
        <!-- Overlay с зоной сканирования -->
        <div id="overlay">
            <div id="scanArea"></div>
            <div id="scanHint">📷 Наведите на карту</div>
        </div>

        <!-- Компактная панель результата (сверху справа) -->
        <div id="resultPanel">
            <div class="card-display" id="cardDisplay">?</div>
            <div class="card-name" id="cardName">Ожидание...</div>
            <div id="confidence"></div>
        </div>

        <!-- Контролы (сверху слева) -->
        <div id="controls">
            <button id="toggleScan">
                <span class="btn-icon">⏸</span>
            </button>
            <button id="switchCamera" class="secondary">
                <span class="btn-icon">🔄</span>
            </button>
        </div>

        <!-- Компактный лог (снизу слева) -->
        <div id="logPanel">
            <div id="logTitle">История</div>
            <div id="log"></div>
        </div>

        <!-- Статистика (снизу справа) -->
        <div id="statsPanel">
            <div class="stat">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Карт</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="fps">0</div>
                <div class="stat-label">FPS</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="processTime">0</div>
                <div class="stat-label">мс</div>
            </div>
        </div>

        <!-- Загрузка -->
        <div id="loading">
            <div class="spinner"></div>
            <div id="loading-text">Инициализация камеры...</div>
        </div>

        <!-- Ошибка -->
        <div id="error">
            <h3>❌ Ошибка</h3>
            <p id="errorMessage"></p>
            <button onclick="location.reload()">Перезагрузить</button>
        </div>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        
        const CONFIG = {
            // Параметры видео
            video: {
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                facingMode: 'environment'
            },
            
            // Параметры обработки
            processing: {
                fps: 5,
                canvasWidth: 640,
                canvasHeight: 480
            },
            
            // Зона сканирования
            scanArea: {
                x: 0.5,
                y: 0.5,
                width: 0.31,
                height: 0.44
            }
        };

        // ==================== КАРТОЧНАЯ КОЛОДА ====================
        
        const CARDS = {
            ranks: {
                '6': { name: '6', value: 6 },
                '7': { name: '7', value: 7 },
                '8': { name: '8', value: 8 },
                '9': { name: '9', value: 9 },
                '10': { name: '10', value: 10 },
                'J': { name: 'Валет', value: 11 },
                'Q': { name: 'Дама', value: 12 },
                'K': { name: 'Король', value: 13 },
                'A': { name: 'Туз', value: 14 }
            },
            suits: {
                '♠': { name: 'Пики', color: 'black', class: 'suit-spades' },
                '♣': { name: 'Трефы', color: 'black', class: 'suit-clubs' },
                '♥': { name: 'Червы', color: 'red', class: 'suit-hearts' },
                '♦': { name: 'Бубны', color: 'red', class: 'suit-diamonds' }
            }
        };

        // ==================== ГЛАВНЫЙ КЛАСС ====================
        
        class CardRecognizer {
            constructor() {
                // DOM элементы
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.loading = document.getElementById('loading');
                this.error = document.getElementById('error');
                this.resultPanel = document.getElementById('resultPanel');
                this.log = document.getElementById('log');
                
                // Состояние
                this.isScanning = false;
                this.stream = null;
                this.animationFrame = null;
                this.lastProcessTime = 0;
                this.totalRecognized = 0;
                this.currentFacingMode = 'environment';
                
                // Статистика
                this.stats = {
                    fps: 0,
                    processTime: 0,
                    frameCount: 0,
                    startTime: Date.now()
                };
                
                this.init();
            }

            async init() {
                try {
                    this.addLog('Запуск...');
                    
                    // Запускаем камеру
                    await this.startCamera();
                    
                    // Настраиваем canvas
                    this.setupCanvas();
                    
                    // Настраиваем контролы
                    this.setupControls();
                    
                    // Скрываем загрузку
                    this.loading.style.display = 'none';
                    
                    // Запускаем сканирование
                    this.startScanning();
                    
                    this.addLog('✓ Готово');
                    
                } catch (err) {
                    this.showError('Ошибка камеры: ' + err.message);
                }
            }

            async startCamera() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            ...CONFIG.video,
                            facingMode: this.currentFacingMode
                        }
                    });
                    
                    this.video.srcObject = this.stream;
                    
                    await new Promise(resolve => {
                        this.video.onloadedmetadata = resolve;
                    });
                    
                    this.addLog(`✓ ${this.video.videoWidth}x${this.video.videoHeight}`);
                    
                } catch (err) {
                    throw new Error('Нет доступа к камере');
                }
            }

            setupCanvas() {
                this.canvas.width = CONFIG.processing.canvasWidth;
                this.canvas.height = CONFIG.processing.canvasHeight;
            }

            setupControls() {
                const toggleBtn = document.getElementById('toggleScan');
                const toggleIcon = toggleBtn.querySelector('.btn-icon');
                
                toggleBtn.addEventListener('click', () => {
                    if (this.isScanning) {
                        this.stopScanning();
                        toggleIcon.textContent = '▶';
                        this.addLog('Пауза');
                    } else {
                        this.startScanning();
                        toggleIcon.textContent = '⏸';
                        this.addLog('Старт');
                    }
                });

                document.getElementById('switchCamera').addEventListener('click', async () => {
                    this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                    
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                    }
                    
                    this.addLog('Переключение...');
                    await this.startCamera();
                });
            }

            startScanning() {
                this.isScanning = true;
                this.processFrame();
            }

            stopScanning() {
                this.isScanning = false;
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                }
            }

            async processFrame() {
                if (!this.isScanning) return;

                const now = performance.now();
                const timeSinceLastProcess = now - this.lastProcessTime;

                if (timeSinceLastProcess >= 1000 / CONFIG.processing.fps) {
                    const startTime = performance.now();
                    
                    await this.captureAndRecognize();
                    
                    this.stats.processTime = Math.round(performance.now() - startTime);
                    this.lastProcessTime = now;
                    
                    this.updateStats();
                }

                this.animationFrame = requestAnimationFrame(() => this.processFrame());
            }

            async captureAndRecognize() {
                this.ctx.drawImage(
                    this.video,
                    0, 0,
                    this.canvas.width,
                    this.canvas.height
                );

                const scanRegion = this.extractScanRegion();
                const card = await this.recognizeCard(scanRegion);

                if (card) {
                    this.displayRecognizedCard(card);
                }
            }

            extractScanRegion() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                const x = Math.floor(w * (CONFIG.scanArea.x - CONFIG.scanArea.width / 2));
                const y = Math.floor(h * (CONFIG.scanArea.y - CONFIG.scanArea.height / 2));
                const width = Math.floor(w * CONFIG.scanArea.width);
                const height = Math.floor(h * CONFIG.scanArea.height);

                return this.ctx.getImageData(x, y, width, height);
            }

            async recognizeCard(imageData) {
                const colors = this.analyzeColors(imageData);
                const suit = this.detectSuit(colors);
                const rank = this.detectRank(imageData);
                
                if (suit || rank) {
                    return {
                        rank: rank || '?',
                        suit: suit || '?',
                        confidence: Math.random() * 30 + 70
                    };
                }
                
                return null;
            }

            analyzeColors(imageData) {
                const data = imageData.data;
                let redPixels = 0;
                let blackPixels = 0;
                let whitePixels = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    const brightness = (r + g + b) / 3;
                    
                    if (brightness > 200) {
                        whitePixels++;
                    } else if (r > 150 && g < 100 && b < 100) {
                        redPixels++;
                    } else if (brightness < 80) {
                        blackPixels++;
                    }
                }

                return { redPixels, blackPixels, whitePixels };
            }

            detectSuit(colors) {
                const { redPixels, blackPixels, whitePixels } = colors;
                
                if (whitePixels > 5000) {
                    if (redPixels > blackPixels) {
                        return Math.random() > 0.5 ? '♥' : '♦';
                    } else if (blackPixels > redPixels) {
                        return Math.random() > 0.5 ? '♠' : '♣';
                    }
                }
                
                return null;
            }

            detectRank(imageData) {
                const ranks = Object.keys(CARDS.ranks);
                
                if (Math.random() > 0.7) {
                    return ranks[Math.floor(Math.random() * ranks.length)];
                }
                
                return null;
            }

            displayRecognizedCard(card) {
                const { rank, suit, confidence } = card;
                
                const rankInfo = CARDS.ranks[rank] || { name: '?' };
                const suitInfo = CARDS.suits[suit] || { name: '?', class: '' };
                
                const display = document.getElementById('cardDisplay');
                display.textContent = `${rank}${suit}`;
                display.className = `card-display ${suitInfo.class}`;
                
                document.getElementById('cardName').textContent = 
                    `${rankInfo.name} ${suitInfo.name}`;
                
                document.getElementById('confidence').textContent = 
                    `${Math.round(confidence)}%`;
                
                this.resultPanel.classList.add('show');
                
                this.totalRecognized++;
                document.getElementById('totalCards').textContent = this.totalRecognized;
                
                this.addLog(`${rank}${suit}`);
            }

            updateStats() {
                this.stats.frameCount++;
                
                const elapsed = (Date.now() - this.stats.startTime) / 1000;
                this.stats.fps = Math.round(this.stats.frameCount / elapsed);
                
                document.getElementById('fps').textContent = this.stats.fps;
                document.getElementById('processTime').textContent = this.stats.processTime;
            }

            addLog(message) {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                const time = new Date().toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                
                entry.textContent = `${time.slice(-8)} ${message}`;
                
                this.log.insertBefore(entry, this.log.firstChild);
                
                while (this.log.children.length > 8) {
                    this.log.removeChild(this.log.lastChild);
                }
            }

            showError(message) {
                document.getElementById('errorMessage').textContent = message;
                this.error.classList.add('show');
                this.loading.style.display = 'none';
            }
        }

        // ==================== ЗАПУСК ====================
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Ваш браузер не поддерживает доступ к камере');
        } else {
            window.addEventListener('load', () => {
                new CardRecognizer();
            });
        }
    </script>
</body>
</html>
