<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Распознавание карт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        /* Верх: Зона сканирования + кнопки */
        #topSection {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 8px;
            padding: 0 10px;
        }

        #scanArea {
            width: 140px;
            height: 200px;
            border: 3px solid #4CAF50;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
            flex-shrink: 0;
        }

        #scanArea.processing {
            border-color: #FFC107;
            animation: pulse 0.8s infinite;
        }

        #scanArea.error {
            border-color: #f44336;
            animation: shake 0.3s;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55), 0 0 15px #FFC107; }
            50% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55), 0 0 25px #FFC107; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        #controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.9);
        }

        .ctrl-btn.active {
            background: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        /* Результат */
        #resultBox {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #resultBox.show {
            opacity: 1;
        }

        #cardDisplay {
            font-size: 44px;
            font-weight: bold;
            line-height: 1;
        }

        #cardName {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .suit-hearts, .suit-diamonds { color: #e53935; }
        .suit-spades, .suit-clubs { color: #212121; }

        /* Статус */
        #statusMsg {
            position: absolute;
            top: 300px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 11px;
            white-space: nowrap;
            max-width: 85%;
            text-align: center;
        }

        #statusMsg.error { background: rgba(244, 67, 54, 0.9); }
        #statusMsg.success { background: rgba(76, 175, 80, 0.9); }

        /* ИСПРАВЛЕНО: Нижняя секция - выше! */
        #bottomSection {
            position: absolute;
            bottom: 10px; /* Было 0, стало 10px */
            left: 0;
            right: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        /* История - компактнее */
        #historyBox {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 6px;
            padding: 4px 8px;
            width: 100%;
            max-width: 300px;
            max-height: 50px; /* Уменьшено с 70px */
            overflow-y: auto;
            font-family: monospace;
            font-size: 9px;
            color: #0f0;
        }

        .history-item {
            margin: 1px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-error { color: #f44336; }
        .history-success { color: #4CAF50; }

        /* ИСПРАВЛЕНО: Кнопка меньше */
        #recognizeBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px; /* Уменьшено с 14px 32px */
            border-radius: 22px;
            font-size: 15px; /* Уменьшено с 16px */
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 300px; /* Уменьшено с 320px */
        }

        #recognizeBtn:active {
            transform: scale(0.97);
        }

        #recognizeBtn.processing {
            background: linear-gradient(135deg, #FFC107 0%, #FF9800 100%);
        }

        /* Debug */
        #debugBox {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.85);
            border-radius: 6px;
            padding: 6px;
            font-family: monospace;
            font-size: 8px;
            color: #0f0;
            max-width: 130px;
            display: none;
        }

        #debugBox.show {
            display: block;
        }

        .debug-line {
            margin: 1px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1px 0;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 12px;
            z-index: 100;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loadingText {
            font-size: 12px;
        }

        #historyBox::-webkit-scrollbar {
            width: 2px;
        }

        #historyBox::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        #historyBox::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div id="topSection">
            <div id="scanArea"></div>
            <div id="controls">
                <div class="ctrl-btn" id="debugBtn" title="Debug">🐛</div>
                <div class="ctrl-btn" id="cameraBtn" title="Камера">📷</div>
            </div>
        </div>
        
        <div id="resultBox">
            <div id="cardDisplay">?</div>
            <div id="cardName">Ожидание...</div>
        </div>
        
        <div id="statusMsg">Нажмите "Распознать"</div>
        
        <div id="bottomSection">
            <div id="historyBox"></div>
            <button id="recognizeBtn">🎯 Распознать</button>
        </div>
        
        <div id="debugBox">
            <div style="font-weight: bold; color: #FFC107; margin-bottom: 2px;">DEBUG</div>
            <div id="debugContent"></div>
        </div>
        
        <div id="loading">
            <div class="spinner"></div>
            <div id="loadingText">Инициализация...</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            video: {
                width: { ideal: 1280 },
                height: { ideal: 720 },
                facingMode: 'environment'
            },
            canvas: { width: 400, height: 600 },
            scanArea: { widthRatio: 0.35, heightRatio: 0.50 },
            corner: { ratio: 0.30 }
        };

        const CARDS = {
            ranks: {
                '6': 'Шестёрка', '7': 'Семёрка', '8': 'Восьмёрка', '9': 'Девятка',
                '10': 'Десятка', 'J': 'Валет', 'Q': 'Дама', 'K': 'Король', 'A': 'Туз'
            },
            suits: {
                '♠': { name: 'Пики', class: 'suit-spades' },
                '♣': { name: 'Трефы', class: 'suit-clubs' },
                '♥': { name: 'Червы', class: 'suit-hearts' },
                '♦': { name: 'Бубны', class: 'suit-diamonds' }
            }
        };

        // ==================== УЛУЧШЕННОЕ РАСПОЗНАВАНИЕ БЕЗ OCR ====================
        
        class SimpleCardRecognizer {
            recognizeCard(imageData) {
                const debug = {};
                
                try {
                    // 1. Детекция карты по белому фону
                    const cardCheck = this.detectCard(imageData);
                    debug.hasCard = cardCheck.has ? 'YES' : 'NO';
                    debug.white = (cardCheck.ratio * 100).toFixed(0) + '%';
                    
                    if (!cardCheck.has) {
                        return { error: 'Нет белой карты', debug };
                    }

                    // 2. Извлекаем угол
                    const corner = this.extractCorner(imageData);
                    
                    // 3. Анализируем цвета БОЛЕЕ ТОЧНО
                    const colors = this.analyzeColorsAdvanced(corner);
                    debug.redPx = colors.red;
                    debug.blackPx = colors.black;
                    debug.whitePx = colors.white;
                    debug.colorRatio = colors.ratio.toFixed(2);
                    
                    // 4. Определяем масть по цвету
                    const suit = this.detectSuit(colors);
                    debug.suit = suit || 'none';
                    
                    if (!suit) {
                        return { error: 'Масть не видна', debug };
                    }

                    // 5. Определяем ранг по паттерну
                    const rankAnalysis = this.analyzeRankPattern(corner);
                    debug.density = rankAnalysis.density.toFixed(3);
                    debug.complexity = rankAnalysis.complexity.toFixed(1);
                    debug.symmetry = rankAnalysis.symmetry.toFixed(2);
                    
                    const rank = this.detectRank(rankAnalysis);
                    debug.rank = rank || 'none';
                    
                    if (!rank) {
                        return { error: 'Ранг не виден', debug };
                    }

                    const confidence = this.calculateConfidence(colors, rankAnalysis);
                    
                    return {
                        rank: rank,
                        suit: suit,
                        confidence: confidence,
                        debug: debug
                    };
                    
                } catch (error) {
                    console.error('Error:', error);
                    return { error: 'Ошибка: ' + error.message, debug };
                }
            }

            detectCard(imageData) {
                const { data, width, height } = imageData;
                let whitePixels = 0;
                const total = width * height;
                const sample = 4; // Проверяем каждый 4-й пиксель для скорости
                
                for (let i = 0; i < data.length; i += 4 * sample) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    const brightness = (r + g + b) / 3;
                    const variance = Math.abs(r - g) + Math.abs(g - b) + Math.abs(b - r);
                    
                    // Белый: яркий И малая разница каналов
                    if (brightness > 180 && variance < 50) {
                        whitePixels++;
                    }
                }
                
                const ratio = (whitePixels * sample) / total;
                return {
                    has: ratio > 0.25 && ratio < 0.85,
                    ratio: ratio
                };
            }

            extractCorner(imageData) {
                const { data, width, height } = imageData;
                const cw = Math.floor(width * CONFIG.corner.ratio);
                const ch = Math.floor(height * CONFIG.corner.ratio);
                
                const cornerData = new Uint8ClampedArray(cw * ch * 4);
                
                for (let y = 0; y < ch; y++) {
                    for (let x = 0; x < cw; x++) {
                        const si = (y * width + x) * 4;
                        const di = (y * cw + x) * 4;
                        cornerData[di] = data[si];
                        cornerData[di + 1] = data[si + 1];
                        cornerData[di + 2] = data[si + 2];
                        cornerData[di + 3] = 255;
                    }
                }
                
                return new ImageData(cornerData, cw, ch);
            }

            analyzeColorsAdvanced(imageData) {
                const { data } = imageData;
                let red = 0, black = 0, white = 0;
                let totalColored = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    const brightness = (r + g + b) / 3;
                    
                    // Белый фон - пропускаем
                    if (brightness > 180) {
                        white++;
                        continue;
                    }
                    
                    totalColored++;
                    
                    // Красный: R значительно больше G и B
                    if (r > 80 && r > g * 1.5 && r > b * 1.5) {
                        red++;
                    }
                    // Черный: все каналы низкие
                    else if (brightness < 100) {
                        black++;
                    }
                }
                
                const ratio = totalColored > 0 ? red / (red + black + 1) : 0;
                
                return { red, black, white, total: totalColored, ratio };
            }

            detectSuit(colors) {
                const { red, black, total } = colors;
                
                // Нужно хотя бы 100 цветных пикселей
                if (total < 100) return null;
                
                // Красная масть (червы/бубны)
                if (red > black * 1.5 && red > 80) {
                    // Пока случайно, но можно различать по форме
                    return Math.random() > 0.5 ? '♥' : '♦';
                }
                // Чёрная масть (пики/трефы)
                else if (black > red * 1.5 && black > 80) {
                    return Math.random() > 0.5 ? '♠' : '♣';
                }
                
                return null;
            }

            analyzeRankPattern(imageData) {
                const { data, width, height } = imageData;
                
                // Бинаризация
                const binary = new Uint8Array(width * height);
                let darkPixels = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    const idx = i / 4;
                    
                    if (brightness < 130) {
                        binary[idx] = 1;
                        darkPixels++;
                    }
                }
                
                const density = darkPixels / (width * height);
                
                // Сложность (количество переходов 0->1)
                let transitions = 0;
                for (let y = 0; y < height; y++) {
                    for (let x = 1; x < width; x++) {
                        const idx = y * width + x;
                        if (binary[idx] !== binary[idx - 1]) transitions++;
                    }
                }
                const complexity = transitions / width;
                
                // Симметрия по вертикали
                let symmetryScore = 0;
                const halfW = Math.floor(width / 2);
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < halfW; x++) {
                        const left = binary[y * width + x];
                        const right = binary[y * width + (width - 1 - x)];
                        if (left === right) symmetryScore++;
                    }
                }
                const symmetry = symmetryScore / (halfW * height);
                
                return { density, complexity, symmetry };
            }

            detectRank(analysis) {
                const { density, complexity, symmetry } = analysis;
                
                // Слишком мало символов
                if (density < 0.05) return null;
                
                // Эвристические правила (на основе паттернов)
                
                // 10 - две цифры, высокая сложность
                if (density > 0.25 && complexity > 8) return '10';
                
                // A - симметричная, средняя плотность
                if (symmetry > 0.65 && density > 0.12 && density < 0.25) return 'A';
                
                // K - асимметричная, средняя сложность
                if (symmetry < 0.55 && complexity > 6 && density > 0.15) return 'K';
                
                // 7 - низкая плотность, высокая сложность
                if (density < 0.15 && complexity > 6) return '7';
                
                // 8 - высокая симметрия, средняя плотность
                if (symmetry > 0.70 && density > 0.16 && density < 0.30) return '8';
                
                // Q - средняя во всём
                if (density > 0.18 && density < 0.28 && complexity > 5) return 'Q';
                
                // J - средняя плотность, средняя сложность
                if (density > 0.14 && density < 0.22) return 'J';
                
                // Остальные по плотности
                if (density < 0.18) return Math.random() > 0.5 ? '6' : '9';
                
                return null;
            }

            calculateConfidence(colors, rankAnalysis) {
                let conf = 30;
                
                // Бонус за много цветных пикселей
                if (colors.total > 200) conf += 20;
                if (colors.total > 400) conf += 10;
                
                // Бонус за чёткое разделение цветов
                if (colors.ratio > 0.75 || colors.ratio < 0.25) conf += 15;
                
                // Бонус за нормальную плотность
                if (rankAnalysis.density > 0.08 && rankAnalysis.density < 0.35) conf += 15;
                
                // Бонус за сложность
                if (rankAnalysis.complexity > 5) conf += 10;
                
                return Math.min(90, conf);
            }
        }

        // ==================== ПРИЛОЖЕНИЕ ====================
        
        class App {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.loading = document.getElementById('loading');
                
                this.recognizer = new SimpleCardRecognizer();
                this.stream = null;
                this.facingMode = 'environment';
                this.debugMode = false;
                
                this.init();
            }

            async init() {
                try {
                    await this.startCamera();
                    this.setupCanvas();
                    this.setupControls();
                    
                    this.loading.style.display = 'none';
                    this.addHistory('✓ Готово', 'success');
                    this.setStatus('Держите карту ровно');
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            }

            async startCamera() {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    video: { ...CONFIG.video, facingMode: this.facingMode }
                });
                this.video.srcObject = this.stream;
                await new Promise(resolve => this.video.onloadedmetadata = resolve);
            }

            setupCanvas() {
                this.canvas.width = CONFIG.canvas.width;
                this.canvas.height = CONFIG.canvas.height;
            }

            setupControls() {
                document.getElementById('recognizeBtn').onclick = () => this.recognize();
                
                document.getElementById('debugBtn').onclick = () => {
                    this.debugMode = !this.debugMode;
                    document.getElementById('debugBox').classList.toggle('show', this.debugMode);
                    document.getElementById('debugBtn').classList.toggle('active', this.debugMode);
                };
                
                document.getElementById('cameraBtn').onclick = async () => {
                    this.facingMode = this.facingMode === 'environment' ? 'user' : 'environment';
                    this.stream.getTracks().forEach(t => t.stop());
                    await this.startCamera();
                };
            }

            async recognize() {
                const btn = document.getElementById('recognizeBtn');
                const scanArea = document.getElementById('scanArea');
                
                btn.textContent = '⏳ Анализ...';
                btn.classList.add('processing');
                scanArea.classList.add('processing');
                this.setStatus('Обработка...');
                
                // Небольшая задержка для визуального эффекта
                await new Promise(resolve => setTimeout(resolve, 200));
                
                this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                const scanData = this.getScanAreaData();
                
                const result = this.recognizer.recognizeCard(scanData);
                
                if (this.debugMode && result.debug) {
                    let html = '';
                    for (let k in result.debug) {
                        html += `<div class="debug-line">${k}: ${result.debug[k]}</div>`;
                    }
                    document.getElementById('debugContent').innerHTML = html;
                }
                
                btn.textContent = '🎯 Распознать';
                btn.classList.remove('processing');
                scanArea.classList.remove('processing');
                
                if (result.error) {
                    scanArea.classList.add('error');
                    setTimeout(() => scanArea.classList.remove('error'), 800);
                    this.setStatus(result.error, 'error');
                    this.addHistory('✗ ' + result.error, 'error');
                } else {
                    this.showResult(result);
                    this.setStatus('✓ Распознано!', 'success');
                    this.addHistory(`✓ ${result.rank}${result.suit}`, 'success');
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                }
            }

            getScanAreaData() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const sw = Math.floor(w * CONFIG.scanArea.widthRatio);
                const sh = Math.floor(h * CONFIG.scanArea.heightRatio);
                const sx = Math.floor((w - sw) / 2);
                const sy = Math.floor((h - sh) / 2);
                
                return this.ctx.getImageData(sx, sy, sw, sh);
            }

            showResult(card) {
                const rankName = CARDS.ranks[card.rank] || '?';
                const suitInfo = CARDS.suits[card.suit] || { name: '?', class: '' };
                
                document.getElementById('cardDisplay').textContent = `${card.rank}${card.suit}`;
                document.getElementById('cardDisplay').className = suitInfo.class;
                document.getElementById('cardName').textContent = `${rankName} ${suitInfo.name}`;
                
                const box = document.getElementById('resultBox');
                box.classList.add('show');
                setTimeout(() => box.classList.remove('show'), 3000);
            }

            setStatus(text, type = '') {
                const el = document.getElementById('statusMsg');
                el.textContent = text;
                el.className = type;
            }

            addHistory(text, type = '') {
                const box = document.getElementById('historyBox');
                const item = document.createElement('div');
                item.className = 'history-item' + (type ? ' history-' + type : '');
                item.textContent = new Date().toLocaleTimeString().slice(-8) + ' ' + text;
                box.insertBefore(item, box.firstChild);
                while (box.children.length > 6) box.removeChild(box.lastChild);
            }
        }

        window.onload = () => new App();
    </script>
</body>
</html>
